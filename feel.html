        for(let k=0;k<4;k++){
          const a=new Audio(dir+'/'+name+'.m4a');
          a.addEventListener('error',()=>{ if(++P.fails===1) console.warn('ping missing/broken: '+dir+'/'+name+'.m4a'); });
          _allAudio.push(a); P.pool.push(a);
        }
      }
      if(P.fails>=4) return;                       // file isn't there — stay quiet
      const now=performance.now();
      if(now-P.last<150) return;                   // minimum gap between pings
      P.last=now;
      const a=P.pool[P.i++%P.pool.length];
      try{ a.currentTime=0; a.volume=0.55; a.play().catch(()=>{}); }catch(_){ }
    };

    const _next=(cx,cy)=>{
      if(born12<need12){
        born12++;
        _ping('ping1');
        _spawn(12, cx, cy, Math.round(160+Math.random()*330), false);
        return true;
      }
      if(bag.length){
        castBorn++;
        if(castBorn%4===0){   // every fourth birth: the writing surfaces again between the screens
          _ping('ping1');   // window 12 ALWAYS carries the sent-sound, wherever it appears
          _spawn(12, cx+(Math.random()*160-80), cy+(Math.random()*160-80), Math.round(140+Math.random()*220), false);
        }
        _ping('ping2');
        if(castBorn%3===0){   // every third birth: one of the smalls barges in
          const vn=SMALLS[Math.floor(Math.random()*SMALLS.length)];
          _spawn(vn, cx, cy, Math.round(CAST_W[vn]*ss*(0.8+Math.random()*0.4)), false);
        } else {
          const vn=bag.shift();
          const w2=Math.round(CAST_W[vn]*ss*(0.45+Math.random()*0.55));
          _spawn(vn, cx, cy, w2, (vn===3 && !relicGiven) ? (relicGiven=true) : false);
        }
        return true;
      }
      return false;
    };

    // the mouse operates the room. 5 idle seconds finish whatever is left
    // (paced, one every 160ms, at random spots — so the journey never stalls).
    (function(){
      let lx=0, ly=0, acc=0, fbT=null, done=false;
      const _fb=()=>{ if(fbT) clearTimeout(fbT);
        fbT=setTimeout(function tick(){
          if(done) return;
          const ok=_next(Math.random()*(SW*1.2)-SW*0.1, Math.random()*(SH*1.2)-SH*0.1);
          if(ok) fbT=setTimeout(tick, 160); else { done=true; removeEventListener('mousemove', mv);
            if(window._giveSongStart){ window._giveSongStart(); window._giveSongStart=null; }
            if(window._gavePlant) window._gavePlant(); }
        }, 5000); };
      _fb();
      const mv=(e)=>{
        if(done) return;
        if(lx||ly) acc+=Math.hypot(e.clientX-lx, e.clientY-ly);
        lx=e.clientX; ly=e.clientY;
        if(acc>110){ acc=0;
          if(!_next(e.clientX, e.clientY)){ done=true; removeEventListener('mousemove', mv); if(fbT) clearTimeout(fbT);
            if(window._giveSongStart){ window._giveSongStart(); window._giveSongStart=null; }
            if(window._gavePlant) window._gavePlant(); return; }
          _fb();
        }
      };
      addEventListener('mousemove', mv);
      // the wipe (planted OR desktop folder) must silence the birth engine too,
      // or moving the mouse keeps birthing windows after the room has closed.
      window._gaveStop=()=>{ done=true; removeEventListener('mousemove', mv); if(fbT) clearTimeout(fbT); };
    })();

    // one shared label + the desktop log, like a normal settled room
    if(title){
      _logLine('==============================', 'dim');
      _logLine('I left it on the desktop. small enough to keep.', 'say');
      _logLine('it stays there now. I can open it again whenever I want. I probably will.', 'say');
      _logLine('==============================', 'dim');
    }
    // song window: exact existing spotify design (no image), with x/-/+ bar, plain loop.
    (function(){
      const au=new Audio(dir+'/how much i gave you.mp3');
      au.loop=true; _allAudio.push(au);
      const win=makeSongWindow(false, au, 'how much i gave you');
      win._thisRoomSong=true;
      win._roomAudio=au;
      win.style.left=Math.round(978*sx)+'px'; win.style.top=Math.round(43*sy)+'px';
      win.style.zIndex=songZ;

      // makeSongWindow removed its bar (it's a bare player) — add a real x/-/+ bar back on top.
      const bar=document.createElement('div');
      bar.className='bar roombar';
      bar.innerHTML='<div class="dots"><span class="dot" data-close>'+X+'</span>'+
        '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div>';
      win.insertBefore(bar, win.firstChild);
      win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);

      // icons: play (triangle) when paused, pause (two bars) when playing
      const btn=win._btns.play;
      const PLAY_SVG='<svg width="22" height="22" viewBox="0 0 22 22" fill="rgba(255,255,255,.85)"><path d="M5 3 L5 19 L18 11 Z"/></svg>';
      const PAUSE_SVG='<svg width="20" height="22" viewBox="0 0 20 22" fill="rgba(255,255,255,.85)"><rect x="3" y="1" width="6" height="20" rx="1"/><rect x="11" y="1" width="6" height="20" rx="1"/></svg>';
      // the icon follows the audio element itself, so it also flips when something
      // else stops the track (room transition, meltdown, end of clip) — not just on click.
      const setIcon=()=>{ btn.innerHTML = (!au.paused && !au.ended) ? PAUSE_SVG : PLAY_SVG; };
      au.addEventListener('play',  setIcon);
      au.addEventListener('pause', setIcon);
      au.addEventListener('ended', setIcon);
      const toggle=()=>{
        if(au.paused){ au.play().catch(()=>{}); } else { au.pause(); }
      };
      btn.addEventListener('click', toggle);
      win._btns.prev.addEventListener('click',()=>{ au.currentTime=0; });
      win._btns.next.addEventListener('click',()=>{ au.currentTime=0; });
      // the song does NOT start with the room — during the filling only the
      // pings speak. it enters the moment the giving ends (the bag empties).
      window._giveSongStart=()=>{ au.play().catch(()=>{}); setIcon(); };
      setIcon();

      // x truly closes and stops audio
      bar.querySelector('[data-close]').addEventListener('click',(e)=>{
        e.stopPropagation(); au.pause(); au.currentTime=0; win.remove();
      });
      win.addEventListener('mousedown',()=>{ win.style.zIndex=(++z); });
    })();
    // clicking a planted folder: wipe the room, keep ONE small window still
    // playing — video 3 (the big radio figure) — exactly like the fear room's relic.
    window._onPlantedFolderClick=()=>{
      if(window._gaveStop){ window._gaveStop(); window._gaveStop=null; }
      document.querySelectorAll('.win.songwin').forEach(w=>{ if(!w._thisRoomSong) return;
        if(w._roomAudio){ try{ w._roomAudio.pause(); }catch(_){} } w.remove(); });
      const wins=[...document.querySelectorAll('.win')].filter(w=>w._brokenPartWin && !w._relicShrunk && !w._keepRelic && document.body.contains(w));
      let keep=wins.find(w=>w._relic3 && w.querySelector('video'));
      if(!keep){ let best=Infinity; wins.forEach(w=>{ const ar2=w.offsetWidth*w.offsetHeight; if(w.querySelector('video') && ar2<best){ best=ar2; keep=w; } }); }
      wins.forEach(w=>{
        if(w===keep) return;
        w.querySelectorAll('video').forEach(v=>{ try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(_){} });
        w.remove();
      });
      if(keep){
        keep._relicShrunk=true;
        keep._giveRelic=true; keep.classList.add('_giveRelic');   // survives the next rooms, like the fear relic
        keep.style.zIndex='5000';
        const kw=keep.offsetWidth, kh=keep.offsetHeight, tw=[150,190,235,285,340][Math.random()*5|0];   // five DISTINCT tiers — a real mix, never smaller than before
        keep.style.transition='left 1.2s ease, top 1.2s ease, width 1.2s ease, height 1.2s ease';
        keep.style.width=tw+'px'; keep.style.height=Math.round(kh*(tw/kw))+'px';
        const th=Math.round(kh*(tw/kw));
        // lands at a RANDOM clear spot every time — never wherever it happened to stop
        keep.style.left=Math.round(40+Math.random()*Math.max(1,(innerWidth-tw-80)))+'px';
        keep.style.top =Math.round(80+Math.random()*Math.max(1,(innerHeight-th-140)))+'px';
        relicAvoidBrand(keep);
        const kv=keep.querySelector('video'); if(kv){ try{ kv.play(); }catch(_){} }
      }
      if(z<310000) z=310000;
      const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='1900000';
    };
    window._autoBeacon=true;
    // planted when the GIVING ends — or at 15s, whichever comes first (one shot)
    (function(){ let did=false; const go=(wait)=>{ if(did) return; did=true; window._gavePlant=null; setTimeout(plantBatch, wait||0); };
      window._gavePlant=()=>go(1000);   // giving finished -> one breath, then the folders land
      setTimeout(go, 15000); })();   // the folders are planted only after the room has lived a little
  });
}

// ---- EMPTY ROOM composition: diagonal void.
// 3 heavy panels top-left, 4 scattered smaller ones bottom-right,
// paragraph floating free in the empty diagonal between them.
function openRoomEmptyBrokenUp(dir, emotion, title){
  // ---- EMPTY ROOM: one strip, nothing else. the opposite of every other room.
  // the rooms fill; this one stays ONE window that only stretches taller —
  // "i gave until i was empty" is a single thing pulled until nothing is left.
  // chain: 7 (1000x150) -> 13 (x250) -> 14 (x350) -> 15 (x450) -> 16 (x550)
  // -> 17 (x650) -> 18, 19, ... (+100 each, if the files exist) until the
  // window swallows the whole screen. each clip runs ONCE; its end is what
  // grows the window. the last existing clip loops forever.
  // the only other thing on screen: the writing (12) as a layer UNDERNEATH —
  // the growing strip eats it step by step.
  (function(){
    const probe=document.createElement('video');
    probe.onloadeddata=()=>{ build(); };
    probe.onerror=()=>{ openRoomArc(dir, emotion, title); };
    probe.src=dir+'/7.mp4';
  })();

  function build(){
    document.querySelectorAll('.brokenBgText').forEach(t=>t.remove());
    document.querySelectorAll('.win').forEach(w=>{ if(!w._settledRoom && !w._keepRelic && !w._giveRelic) w.remove(); });
    _liveEyes=[]; _eyeTimers.forEach(t=>{clearInterval(t);clearTimeout(t);}); _eyeTimers=[];
    _introShown=true;

    const SW=document.documentElement.clientWidth, SH=document.documentElement.clientHeight;
    const sx=SW/1920, sy=SH/1080, ss=Math.min(sx,sy);

    // like the fear room: bring the console back to its resting z (90).
    (function(){ const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='90'; })();

    const X='<svg viewBox="0 0 12 12"><line x1="3.5" y1="3.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="3.5" x2="3.5" y2="8.5"/></svg>';
    const MINUS='<svg viewBox="0 0 12 12"><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';
    const PLUS='<svg viewBox="0 0 12 12"><line x1="6" y1="2.5" x2="6" y2="9.5"/><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';

    // ---- the stretch sound: rooms/i gave until i was empty/grow.m4a (flat in
    // the room folder). plays once on every growth; a missing or broken file
    // stays silently quiet after a console warning (like the radio / pings).
    let _growFails=0;
    const _growPool=[]; let _growI=0;
    for(let k=0;k<3;k++){
      const a=new Audio(dir+'/grow.m4a');
      a.addEventListener('error',()=>{ if(++_growFails===1) console.warn('grow sound missing/broken: '+dir+'/grow.m4a'); });
      _allAudio.push(a); _growPool.push(a);
    }
    const _grow=()=>{ if(_growFails>=3) return;
      const a=_growPool[_growI++%_growPool.length];
      try{ a.currentTime=0; a.volume=0.6; a.play().catch(()=>{}); }catch(_){ } };

    // ---- the writing, underneath: a small cascade of 12 windows spilling
    // from the TOP-LEFT corner. the strip grows over them and eats the words.
    // one hidden master + cheap canvas mirrors.
    (function(){
      const m=document.createElement('video');
      m.className='brokenBgText';
      m.muted=true; m.playsInline=true; m.autoplay=true; m.loop=true; m.controls=false;
      m.setAttribute('muted','');
      m.src=dir+'/12.mp4';
      m.style.cssText='position:fixed;left:-10000px;top:0;width:10px;height:10px;pointer-events:none;';
      document.body.appendChild(m);
      const mg=()=>m.play().catch(()=>{});
      m.addEventListener('loadeddata', mg); m.addEventListener('canplay', mg); mg();
      const mirrors=[];
      let pf=0;
      (function paint(){
        if(!document.body.contains(m)) return;
        pf++;
        if(m.videoWidth) mirrors.forEach((c,i)=>{ if((pf+i)%2===0 && document.body.contains(c.el)) c.x.drawImage(m.v||m, 0,0, c.el.width, c.el.height); });
        requestAnimationFrame(paint);
      })();
      // frame one: the strip ALONE, nothing else. from the first swap on,
      // every growth throws a WAVE of writing at random spots across the whole
      // screen — by 17 the strip already stands in a field of words.
      window._emptyAddWriting=null;   // set right after the builder
      let _wCount=0;
      const _mkUnder=([lx,ly,lw])=>{
        const bw=Math.round(lw*ss), bh=Math.round(bw*271/439)+26;
        const win=document.createElement('div');
        win.className='win';
        win._settled=true; win._brokenPart=true; win._brokenPartWin=true; win._emptyUnder=true;
        win.style.width=bw+'px'; win.style.height=bh+'px';
        win.style.left=Math.round(lx*sx)+'px';
        win.style.top =Math.round(ly*sy)+'px';
        win.style.zIndex='95';   // above the desktop, BELOW the strip
        win.style.animation='none';
        win.innerHTML='<div class="bar roombar"><div class="dots">'+
          '<span class="dot" data-close>'+X+'</span>'+
          '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div></div>'+
          '<div class="roomstage" style="position:absolute;top:26px;left:0;right:0;bottom:0;width:auto;height:auto;padding:6px;overflow:hidden;border-radius:10px"></div>';
        document.body.appendChild(win);
        const cv=document.createElement('canvas');
        cv.width=Math.max(2,bw); cv.height=Math.max(2,bh-26);
        cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border-radius:8px;pointer-events:none;';
        win.querySelector('.roomstage').appendChild(cv);
        mirrors.push({el:cv, x:cv.getContext('2d')});
        win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);
        const d=win.querySelectorAll('.dot');
        if(d[0]) d[0].addEventListener('click',(e)=>{ e.stopPropagation(); win.remove(); });
      };
      window._emptyAddWriting=()=>{
        if(_wCount>=32) return;                    // hard cap — chrome stays alive
        const n=6+Math.floor(Math.random()*2);     // a wave of 6-7 per growth
        for(let k=0;k<n && _wCount<32;k++){
          _wCount++;
          // varied sizes: a few big ones, most middling, some small
          const r=Math.random();
          const lw = r<0.2 ? 560+Math.random()*180 : r<0.75 ? 320+Math.random()*200 : 170+Math.random()*120;
          const lx=Math.random()*2160-140;         // artboard units, spilling the edges
          const ly=Math.random()*1200-100;
          _mkUnder([lx,ly,lw]);
        }
      };
    })();

    // ---- the strip itself: ONE window, dead center. per-clip sizes in
    // artboard units [video#, width, height]; 18 swallows the WHOLE screen.
    const CHAIN=[[7,1000,150],[13,1000,250],[14,1000,350],[15,1000,450],[16,1000,550],[17,1250,700],[18,0,0]];
    const stripZ=(100+(++z));
    const win=document.createElement('div');
    win.className='win';
    win._settled=true; win._brokenPart=true; win._brokenPartWin=true; win._emptyStrip=true;

    win.style.animation='none';
    win.style.transition='height 1s ease, top 1s ease, width 1s ease, left 1s ease';

      '<span class="dot" data-close>'+X+'</span>'+
      '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div></div>'+
      '<div class="roomstage" style="position:absolute;top:26px;left:0;right:0;bottom:0;width:auto;height:auto;padding:6px;overflow:hidden;border-radius:10px"></div>';
    document.body.appendChild(win);
    const stage=win.querySelector('.roomstage');
    const v=document.createElement('video');
    v.muted=true; v.playsInline=true; v.autoplay=true; v.controls=false;   // no loop — the END is the engine

    v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;border-radius:8px;pointer-events:none;';
    stage.appendChild(v);

    const _place=(wArt,hArt)=>{   // center the strip; wArt 0 = the WHOLE screen
      if(!wArt){
        // the last step is a window like all the others — bar, corners and all —
        // just BIGGER than the screen, so its chrome slides out of view.
        win.style.maxWidth='none';   // .win is capped at 95vw — lift the cap
        win.style.width=(SW+140)+'px'; win.style.left='-70px';
        win.style.height=(SH+170)+'px'; win.style.top='-96px';   // the bar rides above the screen
        win.style.pointerEvents='none';   // 18 is the room, not a window — dead to the mouse (restored when it shrinks to the keepsake)
        const br=document.getElementById('brand'); if(br) br.style.zIndex='150000';   // the word stays above
        if(!win._planted18){ win._planted18=true; setTimeout(plantBatch, 1500); }   // the folders land ON the swallowed screen
        return SH;
      }
      const wpx=Math.round(wArt*ss);
      const hpx=Math.min(SH, Math.round(hArt*ss)+26);
      win.style.width=wpx+'px';
      win.style.height=hpx+'px';
      win.style.left=Math.round((SW-wpx)/2)+'px';
      win.style.top =Math.round(Math.max(0,(SH-hpx)/2))+'px';
      return hpx;
    };

    let idx=0;             // position in CHAIN

    const RUNS={7:2,13:2,14:1,15:2,16:1,17:1,18:1};   // how many times each clip plays before growing
    let playN=0;
    const _playCurrent=()=>{
      playN=0;
      const [vn]=CHAIN[idx];
      v.src=dir+'/'+vn+'.mp4';
      const go=()=>v.play().catch(()=>{});
      v.addEventListener('loadeddata', go, {once:true}); go();
    };

    const _loopHere=()=>{ v.loop=true; try{ v.play().catch(()=>{}); }catch(_){ } };

    v.addEventListener('ended',()=>{
      if(++playN<(RUNS[CHAIN[idx][0]]||1)){ v.currentTime=0; v.play().catch(()=>{}); return; }
      if(idx<CHAIN.length-1){
        idx++;
        _grow();
        if(window._emptyAddWriting) window._emptyAddWriting();   // the writing builds with the strip
        _place(CHAIN[idx][1], CHAIN[idx][2]);
        _playCurrent();
        return;
      }
      _loopHere();   // 18 reached the whole screen — it stays
    });
    // a missing/broken clip anywhere in the chain: stay where we are and loop.
    v.addEventListener('error',()=>{ if(idx>0){ idx--; _place(CHAIN[idx][1], CHAIN[idx][2]); _playCurrent(); v.loop=true; } });

    // open: video 7, 1000x150, dead center. everything starts here.
    _place(CHAIN[0][1], CHAIN[0][2]);
    _playCurrent();

    win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);
    const dots=win.querySelectorAll('.dot');
    if(dots[0]) dots[0].addEventListener('click',(e)=>{ e.stopPropagation(); try{v.pause();}catch(_){ } win.remove(); });
    win.addEventListener('mousedown',()=>{ win.style.zIndex=(100+(++z)); });

    // one shared label + the desktop log, like a normal settled room
    if(title){
      _logLine('==============================', 'dim');
      _logLine('I left it on the desktop. small enough to keep.', 'say');
      _logLine('it stays there now. I can open it again whenever I want. I probably will.', 'say');
      _logLine('==============================', 'dim');
    }

    // the room's song plays in the BACKGROUND — no player window. the room is
    // one strip and almost nothing; a player would compete with it.
    let _emptyAu=null;
    (function(){
      const au=new Audio(dir+'/sound.mp3');
      au.loop=true; _allAudio.push(au); _emptyAu=au;
      const tryPlay=()=>au.play().catch(()=>{});
      setTimeout(tryPlay, 600);
      addEventListener('mousedown', tryPlay, {once:true});
    })();

    // clicking a planted folder: the writing layer dies, the strip is the relic —
    // it shrinks to 150px and keeps playing whatever it reached, like the fear relic.
    window._onPlantedFolderClick=()=>{
      if(_emptyAu){ try{ _emptyAu.pause(); }catch(_){} }
      const br=document.getElementById('brand'); if(br) br.style.zIndex='';
      window._emptyAddWriting=null;
      document.querySelectorAll('.win').forEach(w=>{
        if(w._emptyUnder){ w.querySelectorAll('video').forEach(vv=>{try{vv.pause();}catch(_){}}); w.remove(); } });
      const keep=[...document.querySelectorAll('.win')].find(w=>w._emptyStrip && document.body.contains(w));
      if(keep){
        keep._relicShrunk=true;
        keep._giveRelic=true; keep.classList.add('_giveRelic');
        keep.style.zIndex='5000';
        // the keepsake is the strip the room STARTED as: swap back to 7 while
        // the window is mid-shrink, so the change hides inside the motion.
        keep.style.maxWidth='';   // restore the normal window cap
        // the keepsake keeps 7's TRUE file proportion (read from the video itself),
        // just a bit bigger than a standard relic — and lands at a RANDOM spot,
        // never on the feel.exe word.
        const tw=[240,300,360][Math.random()*3|0];   // three DISTINCT tiers — never smaller than before
        // ONE fixed keepsake shape, whenever the room is closed — early or late.
        // (measuring the playing video gave a different relic per exit moment.)
        const vr=9/16;
        const th=Math.round(tw*vr)+26;
        keep.style.transition='left 1.2s ease, top 1.2s ease, width 1.2s ease, height 1.2s ease';
        keep.style.width=tw+'px'; keep.style.height=th+'px';
        keep.style.left=Math.round(60+Math.random()*Math.max(1,(innerWidth-tw-120)))+'px';
        keep.style.top =Math.round(130+Math.random()*Math.max(1,(innerHeight-th-190)))+'px';
        keep.style.pointerEvents='';   // 18 was dead to the mouse; the keepsake lives again
        const kv=keep.querySelector('video');
        if(kv){ kv.loop=true; kv.src=dir+'/7.mp4';
          kv.style.objectPosition='44% 50%';   // her body sits center (calibrated)
          const kgo=()=>kv.play().catch(()=>{});
          kv.addEventListener('loadeddata', kgo, {once:true}); kgo(); }
      }
      if(z<310000) z=310000;
      const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='1900000';
    };
    window._autoBeacon=true;   // in THIS room the folders wait for 18: planted 1.5s after it swallows the screen
  }
}

    const SW=document.documentElement.clientWidth, SH=document.documentElement.clientHeight;

            ox.save(); ox.translate(S,0); ox.scale(-1,1);   // a mirror, like a mirror
            ox.filter='grayscale(1) contrast(1.15)';

    const X='<svg viewBox="0 0 12 12"><line x1="3.5" y1="3.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="3.5" x2="3.5" y2="8.5"/></svg>';

    // ---- the beats. 8 opens alone; +5s: 1/6/11; +10s: 3/18/15/12.
    // hovering any visible window swaps ITS video once (window stays, only

    const DPR=Math.min(2, window.devicePixelRatio||1);
    const SH19=1;   // the 19-tiles stay FULL size — they must fill the screen edge to edge
    const PHASE1=new Set([1,6,11]), PHASE2=new Set([3,18,15,12]);
    let _n1=0, _n2=0;

    const _show=(w)=>{ if(!document.body.contains(w)) return;

    // ---- the circle, calibrate HERE (fractions of the 8-window):

    let _swapSeen=false, _p19=false, _bombT=null, _p19mv=null;

    let _swapArmed=false;   // hover starts counting only once the room is fully in

    const _startP19=()=>{

    // ---- the sounds of this room.

    (function(){

    INSTANCES.forEach((inst)=>{

      win.classList.remove('trap');

    // rows of the same image: the copies INTERLOCK like the SVG — first and

    (function(){

    if(title){

// ---- "that it wasnt my fault" composition (the LAST room): a triptych opens

function openRoomFaultBrokenUp(dir, emotion, title){

    document.querySelectorAll('.brokenBgText').forEach(t=>t.remove());

    _introShown=true;
    (function(){ const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='90'; })();

    const SW=document.documentElement.clientWidth, SHh=document.documentElement.clientHeight;
    const sx=SW/1920, sy=SHh/1080, ss=Math.min(sx,sy);
    const DPR=Math.min(2, window.devicePixelRatio||1);
    // window boxes follow the SVG EXACTLY (the canvas cover-crops the video to
    // fill the box), scaled up a touch so neighbors overlap — no gaps — and
    // spread outward so the outer columns START outside the screen.
    const K=1.15, SPX=1.06, SPY=1.06;
    const BOX=(ix,iy,iw,ih)=>{
      const w=Math.round(iw*sx*K), h=Math.round(ih*sy*K)+26;
      const cx=SW/2  + ((ix+iw/2)-960)*sx*SPX;
      const cy=SHh/2 + ((iy+ih/2)-540)*sy*SPY;
      return {x:Math.round(cx-w/2), y:Math.round(cy-h/2), w:w, h:h};
    };

    // layout copied 1:1 from the room SVG (1920x1080 artboard).
    // each entry: [x, y, w, h, video#, row] — row: A top ... F bottom,
    // '1' = the center column. the LAST 3-copy and LAST 5-copy are where the
    // opening triptych lands; the middle 1 (y=340) is the opener itself.
    const INSTANCES=[
      // row A — left (20) then right (19)
      [0,0,169,274,20,'A'],[88,0,169,274,20,'A'],[175,0,169,274,20,'A'],[263,0,169,274,20,'A'],
      [350,0,169,274,20,'A'],[438,0,169,274,20,'A'],[525,0,169,274,20,'A'],[613,0,169,274,20,'A'],
      [1043,1,169,273,19,'A'],[1138,1,169,273,19,'A'],[1225,1,169,273,19,'A'],[1313,1,169,273,19,'A'],
      [1401,1,169,273,19,'A'],[1488,1,169,273,19,'A'],[1576,1,169,273,19,'A'],[1663,1,169,273,19,'A'],[1751,1,169,273,19,'A'],
      // row B — 18 on both sides
      [0,237,207,205,18,'B'],[189,235,207,205,18,'B'],[314,235,207,205,18,'B'],[415,235,207,205,18,'B'],
      [518,235,207,205,18,'B'],[610,235,207,205,18,'B'],[665,235,207,205,18,'B'],
      [1105,235,207,205,18,'B'],[1167,235,207,205,18,'B'],[1228,235,207,205,18,'B'],[1351,235,207,205,18,'B'],
      [1474,235,207,205,18,'B'],[1597,235,207,205,18,'B'],[1719,235,207,205,18,'B'],
      // row C — the middle line: 3 left, 5 right (the last of each = triptych target)
      [-11,385,107,276,3,'C'],[39,385,107,276,3,'C'],[100,385,107,276,3,'C'],[161,385,107,276,3,'C'],
      [211,385,107,276,3,'C'],[259,385,107,276,3,'C'],[305,385,107,276,3,'C'],[361,385,107,276,3,'C'],
      [413,385,107,276,3,'C'],[474,385,107,276,3,'C'],[534,385,107,276,3,'C'],[587,385,107,276,3,'C'],
      [647,385,107,276,3,'C'],[706,385,107,276,3,'C'],
      [1753,386,182,275,5,'C'],[1663,386,182,275,5,'C'],[1573,386,182,275,5,'C'],[1483,386,182,275,5,'C'],
      [1393,386,182,275,5,'C'],[1303,386,182,275,5,'C'],[1213,386,182,275,5,'C'],[1122,386,182,275,5,'C'],
      // row D — 12/13/14 left, 17/16/15 right
      [-1,645,220,222,12,'D'],[51,645,220,222,12,'D'],[116,645,220,222,12,'D'],
      [180,645,219,222,13,'D'],[280,645,219,222,13,'D'],[369,645,219,222,13,'D'],
      [537,644,220,223,14,'D'],[631,644,220,223,14,'D'],
      [1765,653,207,203,15,'D'],
      [1625,648,210,208,17,'D'],[1517,648,210,208,17,'D'],[1410,648,210,208,17,'D'],
      [1304,649,208,207,16,'D'],[1199,649,208,207,16,'D'],[1093,649,208,207,16,'D'],
      // rows E+F layers, bottom to top: 9/10/11, then 7/8 above them, then the tall 4 and 6 above all
      [398,828,202,131,11,'E'],[341,828,202,131,11,'E'],[257,828,202,131,11,'E'],[182,828,202,131,11,'E'],
      [0,830,220,146,9,'E'],[75,831,220,146,9,'E'],[151,831,220,146,9,'E'],
      [1776,842,208,135,10,'E'],[1699,842,208,135,10,'E'],[1621,842,208,135,10,'E'],
      [1543,842,202,131,11,'E'],[1452,842,202,131,11,'E'],[1349,842,202,131,11,'E'],
      [-1,958,222,126,7,'F'],[131,959,222,126,7,'F'],[217,959,222,126,7,'F'],[316,959,222,126,7,'F'],
      [1718,964,209,123,8,'F'],[1624,964,209,123,8,'F'],[1515,964,209,123,8,'F'],[1408,964,209,123,8,'F'],[1331,964,209,123,8,'F'],
      [532,813,104,271,4,'E'],[595,813,104,271,4,'E'],[654,813,104,271,4,'E'],[717,813,104,271,4,'E'],
      [1238,812,182,272,6,'E'],[1160,812,182,272,6,'E'],[1083,812,182,272,6,'E'],
      // the center column of 1 — middle copy is the opener; the rest wait for their rows
      [772,-30,385,401,1,'1A'],[772,155,385,401,1,'1B'],[772,340,385,401,1,'1C'],[772,526,385,401,1,'1D'],[772,711,385,401,1,'1F'],
    ];
    // triptych landing spots on the middle line (SVG coords)
    const T1=[772,340,385,401];   // the center 1's landing box

    // hidden master videos, one per file; every window is a live canvas mirror.
    const usedVids=[...new Set(INSTANCES.map(r=>r[4]).concat([2]))];   // 2 is not placed — it arrives when 1 shrinks
    const masters={};
    usedVids.forEach(nv=>{
      const v=document.createElement('video');
      v.className='brokenBgText';
      v.muted=true; v.playsInline=true; v.autoplay=true; v.loop=true; v.controls=false;
      v.setAttribute('muted','');
      v.src=dir+'/'+nv+'.mp4';
      v.style.cssText='position:fixed;left:-10000px;top:0;width:10px;height:10px;pointer-events:none;';
      document.body.appendChild(v);
      const go=()=>v.play().catch(()=>{});
      v.addEventListener('loadeddata', go); v.addEventListener('canplay', go); go();
      masters[nv]=v;
    });

    const mirrors=[];
    const _roomSongs=[];
    (function paint(){
      if(!Object.values(masters).some(v=>document.body.contains(v))) return;
      mirrors.forEach(m=>{
        const v=m.v; if(!v.videoWidth) return;
        if(m.win && !m.sized){
          m.sized=true;
          const h2=Math.round(m.wpx*v.videoHeight/v.videoWidth)+26;
          m.win.style.height=h2+'px';
          m.c.width=Math.round(m.wpx*DPR); m.c.height=Math.max(2,Math.round((h2-26)*DPR));
        }
        const c=m.c, ctx=m.x, cw=c.width, ch=c.height;
        const vr=v.videoWidth/v.videoHeight, cr=cw/ch;
        let sw,sh,sxx,syy;
        if(vr>cr){ sh=v.videoHeight; sw=sh*cr; sxx=(v.videoWidth-sw)/2; syy=0; }
        else{ sw=v.videoWidth; sh=sw/cr; sxx=0; syy=(v.videoHeight-sh)/2; }
        ctx.drawImage(v, sxx,syy,sw,sh, 0,0,cw,ch);
      });
      requestAnimationFrame(paint);
    })();

    const X='<svg viewBox="0 0 12 12"><line x1="3.5" y1="3.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="3.5" x2="3.5" y2="8.5"/></svg>';
    const MINUS='<svg viewBox="0 0 12 12"><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';
    const PLUS='<svg viewBox="0 0 12 12"><line x1="6" y1="2.5" x2="6" y2="9.5"/><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';

    const _show=(w)=>{ if(!document.body.contains(w) || w.style.opacity==='1') return; w.style.opacity='1'; setTimeout(()=>{ w.style.pointerEvents=''; }, 820); };   // the mouse feels it only once it is SEEN
    const rows={A:[],B:[],C:[],D:[],E:[],F:[]};
    const ones={};            // A/B/D/F -> the center-1 window at that height
    let _big1=null;           // the opener 1 — stays as the relic at the end
    const _rowTimers=[];

    INSTANCES.forEach((inst)=>{
      const [ix,iy,iw,ih,ivid,irow]=inst;
      const win=document.createElement('div');
      win.className='win';
      win._settled=true; win._brokenPart=true; win._brokenPartWin=true;
      const bx=BOX(ix,iy,iw,ih);
      const wpx=bx.w, hpx=bx.h;
      win.style.width=wpx+'px'; win.style.height=hpx+'px';
      win.style.left=bx.x+'px'; win.style.top=bx.y+'px';
      win.style.zIndex=(100+(++z));   // 100+ opens OVER the console (#syslog z:90)
      win._homeZ=win.style.zIndex;    // birth layer — the openers come back here after the shrink
      win.style.opacity='0'; win.style.pointerEvents='none';   // hidden windows must not eat the mouse
      win.style.transition='opacity .8s ease';
      win.style.animation='none';   // the .win pop keyframe would flash every hidden window

      win.innerHTML='<div class="bar roombar"><div class="dots">'+
        '<span class="dot" data-close>'+X+'</span>'+
        '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div></div>'+
        '<div class="roomstage" style="position:absolute;top:26px;left:0;right:0;bottom:0;width:auto;height:auto;padding:6px;overflow:hidden;border-radius:10px"></div>';
      document.body.appendChild(win);
      const stage=win.querySelector('.roomstage');
      const cv=document.createElement('canvas');
      const cw=Math.max(2, Math.round(wpx*DPR)), ch=Math.max(2, Math.round((hpx-26)*DPR));
      cv.width=cw; cv.height=ch;
      cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border-radius:8px;pointer-events:none;';
      stage.appendChild(cv);
      const _m={ v:masters[(irow.length===2 && irow!=='1C') ? 2 : ivid], c:cv, x:cv.getContext('2d'), win:win, wpx:wpx, vid:ivid, svg:[ix,iy], sized:true };   // the center column plays 2
      mirrors.push(_m); win._mirror=_m;

      if(irow==='1C'){ _big1=win; }
      else if(irow==='1A'){ ones.A=win; }
      else if(irow==='1B'){ ones.B=win; }
      else if(irow==='1D'){ ones.D=win; }
      else if(irow==='1F'){ ones.F=win; }
      else rows[irow].push(_m);

      win.classList.remove('trap');
      win.style.cursor='default';
      win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);
      const dots=win.querySelectorAll('.dot');
      if(dots[0]){
        const c=dots[0].cloneNode(true); dots[0].parentNode.replaceChild(c, dots[0]);
        c.addEventListener('click',(e)=>{ e.stopPropagation(); win.remove(); });
      }
      if(dots[1]){
        const c=dots[1].cloneNode(true); dots[1].parentNode.replaceChild(c, dots[1]);
        c.addEventListener('click',(e)=>{ e.stopPropagation();
          win.classList.add('minimizing');
          setTimeout(()=>win.remove(), 400); });
      }
      if(dots[2]){
        const c=dots[2].cloneNode(true); dots[2].parentNode.replaceChild(c, dots[2]);
        c.addEventListener('click',(e)=>{ e.stopPropagation();
          win.style.zIndex=(100+(++z));
          // grow the STAGE proportionally: the bar height is fixed, so scaling
          // the whole window warps the video (object-fit:fill). scale the body
          // only and add the bar back — the video aspect never changes.
          const _bh=win.querySelector('.bar')?.offsetHeight||0;
          const _W0=win.offsetWidth, _H0=win.offsetHeight;
          win.style.transition='width .3s ease, height .3s ease';
          win.style.width=Math.round(_W0*1.4)+'px';
          win.style.height=Math.round(_bh+(_H0-_bh)*1.4)+'px'; });
      }
      win.addEventListener('mousedown',()=>{ win.style.zIndex=(100+(++z)); });
    });

    // the opening takes the WHOLE middle row out of row C — every 3 and every
    // 5 — all of them big at the start; the shrink sends each to its own SVG
    // spot, so the middle line completes itself with nothing left to fill.
    const _pullAll=(vid)=>{ const out=[]; for(let i=rows.C.length-1;i>=0;i--){ if(rows.C[i].vid===vid) out.unshift(rows.C.splice(i,1)[0]); } return out; };
    const OPEN3=_pullAll(3);   // 14 copies
    const OPEN5=_pullAll(5);   // 8 copies

    // ---- the OPENING triptych: 3 and 5 huge, 1 huger, centered; the three
    // shrink into their SVG spots after 5 seconds.
    const _bigify=(mm, bx)=>{   // explicit box — the canvas cover-crops to fill it
      const w2=mm.win;
      mm.wpx=bx.w; mm.sized=true;
      w2.style.width=bx.w+'px'; w2.style.height=bx.h+'px';
      mm.c.width=Math.max(2,Math.round(bx.w*DPR)); mm.c.height=Math.max(2,Math.round((bx.h-26)*DPR));
      w2.style.left=bx.x+'px'; w2.style.top=bx.y+'px';
      w2.style.zIndex=(100+(++z));
    };
    const _shrinkTo=(mm, spot)=>{
      const bx=BOX(spot[0],spot[1],spot[2],spot[3]);
      const w2=mm.win;
      w2.style.transition='left 1.2s ease, top 1.2s ease, width 1.2s ease, height 1.2s ease';
      w2.style.left=bx.x+'px'; w2.style.top=bx.y+'px';
      w2.style.width=bx.w+'px'; w2.style.height=bx.h+'px';
      setTimeout(()=>{
        mm.wpx=bx.w;
        mm.c.width=Math.max(2,Math.round(bx.w*DPR)); mm.c.height=Math.max(2,Math.round((bx.h-26)*DPR));
        w2.style.transition='opacity .8s ease';
        if(w2._homeZ) w2.style.zIndex=w2._homeZ;   // back to the birth layer
      }, 1300);
    };
    const big1m=_big1._mirror;
    // the opening FILLS the screen: 1 huge in the center — FULL height, true
    // ratio; each side zone is tiled edge to edge by TWO dense rows of its
    // whole crew (14 threes left, 8 fives right), true ratios, overlapping —
    // no gaps anywhere. 1 lifts LAST, on top.
    const w1=Math.round((SHh-26)*418/436), x1=Math.round((SW-w1)/2);
    const rowH=Math.ceil(SHh/2)+13;                    // two rows that overlap in the middle seam
    const _grid=(list, x0, xLast, vw2, vh2)=>{         // columns spread x0 -> xLast, two rows
      const cols=Math.ceil(list.length/2);
      const w=Math.round((rowH-26)*vw2/vh2);
      const step=cols>1 ? (xLast-x0)/(cols-1) : 0;
      list.forEach((mm,i)=>{
        const r=(i/cols)|0, c2=i%cols;
        _bigify(mm, {x:Math.round(x0+c2*step), y:(r===0?0:SHh-rowH), w:w, h:rowH});
      });
      return w;
    };
    const w3o=Math.round((rowH-26)*107/276), w5o=Math.round((rowH-26)*182/275);
    _grid(OPEN3, 0, x1+24-w3o, 107, 276);              // left: flush left -> tucked under 1
    _grid(OPEN5, x1+w1-24, SW-w5o, 182, 275);          // right: tucked under 1 -> flush right
    _bigify(big1m, {x:x1, y:0, w:w1, h:SHh});          // full height, true ratio, last = on top
    setTimeout(()=>{ OPEN3.forEach(mm=>_show(mm.win)); OPEN5.forEach(mm=>_show(mm.win)); }, 300);
    setTimeout(()=>{ _show(_big1); }, 600);

    // the room's sound plays in the BACKGROUND — no player window.
    (function(){
      const au=new Audio(dir+'/sound.m4a');
      au.loop=true; _allAudio.push(au); _roomSongs.push(au);
      const tryPlay=()=>au.play().catch(()=>{});
      setTimeout(tryPlay, 600);
      addEventListener('mousedown', tryPlay, {once:true});
    })();

    // ---- the two effects of this room:
    //   rooms/that it wasnt my fault/fx1.m4a — the CONTINUOUS sound: loops from
    //     the very start; ducks low during the click-building, returns after.
    //   rooms/that it wasnt my fault/fx2.m4a — the mouse CLICK: once right
    //     before the shrink, then once for every window a row adds.
    // missing/broken files stay silently quiet after one console warning.
    let _fx1=null;
    (function(){
      const a=new Audio(dir+'/fx1.m4a');
      a.loop=true; a.volume=0.7;
      a.addEventListener('error',()=>{ console.warn('fx missing/broken: '+dir+'/fx1.m4a'); _fx1=null; });
      _allAudio.push(a); _fx1=a;
      const tryPlay=()=>a.play().catch(()=>{});
      tryPlay();                                   // the continuous sound lives from the very start
      addEventListener('mousedown', tryPlay, {once:true});
    })();
    const _fx1To=(to)=>{                           // smooth volume glide
      if(!_fx1) return;
      const a=_fx1, from=a.volume, t0=performance.now();
      (function step(){
        const p=Math.min(1,(performance.now()-t0)/1000);
        a.volume=from+(to-from)*p;
        if(p<1) requestAnimationFrame(step);
      })();
    };
    const _clkPool=[]; let _clkI=0, _clkFails=0, _clkLast=0;
    for(let k=0;k<4;k++){
      const a=new Audio(dir+'/fx2.m4a');
      a.addEventListener('error',()=>{ if(++_clkFails===1) console.warn('fx missing/broken: '+dir+'/fx2.m4a'); });
      _allAudio.push(a); _clkPool.push(a);
    }
    const _clk=()=>{ if(_clkFails>=4) return;
      const now=performance.now();
      if(now-_clkLast<90) return;                  // rows tick every 120ms — let most of them speak
      _clkLast=now;
      const a=_clkPool[_clkI++%_clkPool.length];
      try{ a.currentTime=0; a.volume=0.55; a.play().catch(()=>{}); }catch(_){ } };
    const _shrink1to2=()=>{   // 1 lands on its spot and turns INTO video 2, at 2's true ratio
      const bx=BOX(T1[0],T1[1],T1[2],T1[3]);
      const v2=masters[2];
      const bh=(v2 && v2.videoWidth) ? Math.round(bx.w*v2.videoHeight/v2.videoWidth)+26 : bx.h;
      const w2=_big1;
      if(v2 && v2.videoWidth) big1m.v=v2;   // the switch happens NOW — one frame, never seen mid-flight
      w2.style.transition='left 1.2s ease, top 1.2s ease, width 1.2s ease, height 1.2s ease';
      w2.style.left=bx.x+'px'; w2.style.top=bx.y+'px';
      w2.style.width=bx.w+'px'; w2.style.height=bh+'px';
      setTimeout(()=>{
        big1m.wpx=bx.w;
        big1m.c.width=Math.max(2,Math.round(bx.w*DPR)); big1m.c.height=Math.max(2,Math.round((bh-26)*DPR));
        w2.style.transition='opacity .8s ease';
        if(w2._homeZ) w2.style.zIndex=w2._homeZ;
      }, 1300);
    };
    setTimeout(()=>{
      _clk();                                      // the click — then everything moves
      _fx1To(0.18);                                // the continuous sound steps back for the clicks
      OPEN3.forEach(mm=>_shrinkTo(mm, [mm.svg[0], mm.svg[1], 107, 276]));
      OPEN5.forEach(mm=>_shrinkTo(mm, [mm.svg[0], mm.svg[1], 182, 275]));
      _shrink1to2();
    }, 5000);

    // ---- the rows: top and bottom first, then inward, each row growing from
    // BOTH edges toward the middle; a finished row births its center 1.
    const _revealRow=(list, done, iv)=>{
      const s2=list.slice().sort((a,b)=>a.svg[0]-b.svg[0]);
      const seq=[]; let i=0, j=s2.length-1;
      while(i<=j){ seq.push(s2[i++]); if(i<=j) seq.push(s2[j--]); }
      let k=0;
      const t=setInterval(()=>{
        if(k>=seq.length){ clearInterval(t); if(done) done(); return; }
        _clk();                                    // every added window clicks
        _show(seq[k++].win);
      }, iv||120);
      _rowTimers.push(t);
    };
    const _runPair=(names, next)=>{
      let left=names.length;
      names.forEach(n=>{
        _revealRow(rows[n], ()=>{
          if(ones[n]) setTimeout(()=>_show(ones[n]), 300);
          if(--left===0 && next) setTimeout(next, 250);
        });
      });
    };
    // the shrink lands at ~6.3s; the middle row fills itself right away,
    // then the rest of the rows chain in — quick.
    setTimeout(()=>{
      _revealRow(rows.C, ()=>{
        _runPair(['A','F'], ()=> _runPair(['B','E'], ()=> _runPair(['D'], ()=>_fx1To(0.7))));
      }, 90);
    }, 6400);

    if(title){
      _logLine('==============================', 'dim');
      _logLine('I left it on the desktop. small enough to keep.', 'say');
      _logLine('it stays there now. I can open it again whenever I want. I probably will.', 'say');
      _logLine('==============================', 'dim');
    }
    // clicking a planted folder: wipe the herd, keep ONE small window still
    // playing — the center 1, the window the room opened with.
    window._onPlantedFolderClick=()=>{
      _roomSongs.forEach(au=>{ try{ au.pause(); }catch(_){} });
      document.querySelectorAll('.win.songwin').forEach(w=>{ if(!w._thisRoomSong) return;
        if(w._roomAudio){ try{ w._roomAudio.pause(); }catch(_){} } w.remove(); });
      const wins=[...document.querySelectorAll('.win')].filter(w=>w._brokenPartWin && !w._relicShrunk && !w._keepRelic && document.body.contains(w));
      let keep=(_big1 && document.body.contains(_big1)) ? _big1 : null;
      if(!keep){ let best=Infinity; wins.forEach(w=>{ const ar2=w.offsetWidth*w.offsetHeight; if(ar2<best){ best=ar2; keep=w; } }); }
      wins.forEach(w=>{ if(w!==keep) w.remove(); });
      if(keep && keep._mirror && masters[1]) keep._mirror.v=masters[1];   // the relic switches AGAIN: back to video 1
      if(keep && keep._mirror){
        const km=keep._mirror;
        km.v.classList.remove('brokenBgText');
        mirrors.splice(0, mirrors.length, km);
        Object.values(masters).forEach(v=>{ if(v!==km.v){ try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(_){} v.remove(); } });
      }
      if(keep){
        keep._relicShrunk=true;
        keep._giveRelic=true; keep.classList.add('_giveRelic');   // survives the next rooms
        keep.style.opacity='1'; keep.style.pointerEvents='';
        keep.style.zIndex='5000';
        const kw=keep.offsetWidth, kh=keep.offsetHeight, tw=[150,190,235,285,340][Math.random()*5|0];   // five DISTINCT tiers — a real mix, never smaller than before
        const th=Math.round((kh-26)*(tw/kw)) + 26;   // ratio on the VIDEO, bar added on top
        keep.style.transition='opacity .8s ease, left 1.2s ease, top 1.2s ease, width 1.2s ease, height 1.2s ease';
        keep.style.width=tw+'px'; keep.style.height=th+'px';
        // lands at a RANDOM clear spot every time — never the same corner
        keep.style.left=Math.round(40+Math.random()*Math.max(1,(innerWidth-tw-80)))+'px';
        keep.style.top =Math.round(80+Math.random()*Math.max(1,(innerHeight-th-140)))+'px';
        relicAvoidBrand(keep);
      }
      _rowTimers.forEach(t=>clearInterval(t));
      if(z<310000) z=310000;
      const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='1900000';
    };
    window._autoBeacon=true; setTimeout(plantBatch, 15000);   // the folders are planted only after the room has lived a little
  });
}

// ---- "something i said" composition: video 21 opens alone as the full-screen
// background + the player; crossing the hidden spots births the primaries ONE
// BY ONE in a fixed order (two spots at once = two videos); a 5s safety
// finishes the set if the mouse wanders without completing it. once all seven
// are up the room goes wild: every second one more video lands — any video,
// random size (sometimes huge, sometimes tiny), truly random spot.
function openRoomSaidBrokenUp(dir, emotion, title){
  probeVideos(dir, (count)=>{
    if(count<1){ openRoomArc(dir, emotion, title); return; }
    document.querySelectorAll('.brokenBgText').forEach(t=>t.remove());
    document.querySelectorAll('.win').forEach(w=>{ if(!w._settledRoom && !w._keepRelic && !w._giveRelic) w.remove(); });
    _liveEyes=[]; _eyeTimers.forEach(t=>{clearInterval(t);clearTimeout(t);}); _eyeTimers=[];
    _introShown=true;
    (function(){ const br=document.getElementById('brand'); if(br) br.style.zIndex='150000'; })();   // the word stays above the broadcast
    (function(){ const sl=document.getElementById('syslog'); if(sl) sl.style.zIndex='90'; })();

    // layout copied 1:1 from the room SVG (1920x1080 artboard).
    // each entry: [x, y, w, h, video#] - array order = z order (bottom to top).
    // video# 0 = the song player. 21 is the full-screen background.
    const INSTANCES=[
      [0,0,1920,1080,21],
      [698,175,554,508,1],
      [297,63,375,197,0],
      [695,177,559,505,2],
      [694,178,562,502,3],
      [696,175,556,508,4],
      [1702,82,195,608,5],
      [1700,82,199,348,7],
      [1701,85,197,343,6],
      [1448,82,119,372,5],
      [1447,82,121,213,7],
      [1448,84,121,209,6],
      [1700,641,199,224,8],
      [1701,642,196,222,9],
      [1701,643,198,221,10],
      [1700,641,199,223,11],
      [1239,391,290,529,13],
      [1240,392,288,525,12],
      [127,159,139,434,5],
      [53,446,426,439,15],
      [49,449,435,433,14],
      [126,159,140,246,7],
      [126,161,140,242,6],
      [369,295,286,355,16],
      [370,295,284,355,17],
      [593,574,288,294,18],
      [593,579,287,288,20],
      [590,576,293,290,19],
      [1160,590,119,121,18],
      [1160,592,118,119,20],
      [1159,591,121,119,19],
      [358,729,111,125,8],
      [358,730,110,124,9],
      [358,728,111,124,10],
      [358,727,111,125,11],
    ];

    const SW=document.documentElement.clientWidth, SHh=document.documentElement.clientHeight;
    const sx=SW/1920, sy=SHh/1080, ss=Math.min(sx,sy);

    // native sizes of the pre-cropped videos.
    const VID_AR={1:[400,360],2:[400,360],3:[400,360],4:[400,360],5:[120,380],
                  6:[120,210],7:[120,210],8:[160,180],9:[160,180],10:[160,180],
                  11:[160,180],12:[200,360],13:[200,360],14:[300,300],15:[300,300],
                  16:[200,250],17:[200,250],18:[180,180],19:[180,180],20:[180,180],
                  21:[1920,1080]};

    // hidden master videos, one per file; every window is a live canvas mirror.
    const usedVids=[...new Set(INSTANCES.map(r=>r[4]).filter(v=>v>0))];
    const masters={};
    usedVids.forEach(nv=>{
      const v=document.createElement('video');
      v.className='brokenBgText';
      v.muted=true; v.playsInline=true; v.autoplay=true; v.loop=true; v.controls=false;
      v.setAttribute('muted','');
      v.src=dir+'/'+nv+'.mp4';
      v.style.cssText='position:fixed;left:-10000px;top:0;width:10px;height:10px;pointer-events:none;';
      document.body.appendChild(v);
      const go=()=>v.play().catch(()=>{});
      v.addEventListener('loadeddata', go); v.addEventListener('canplay', go); go();
      masters[nv]=v;
    });

    const mirrors=[];
    let _bgWin=null, _relic20=null;
    const _roomSongs=[];
    const DPR=Math.min(2, window.devicePixelRatio||1);
    (function paint(){
      if(!Object.values(masters).some(v=>document.body.contains(v))) return;
      mirrors.forEach(m=>{
        const v=m.v; if(!v.videoWidth) return;
        if(m.win && !m.sized){
          m.sized=true;
          if(!m.fullBg){
            const bar=m.noBar?0:26;
            const h2=Math.round(m.wpx*v.videoHeight/v.videoWidth)+bar;
            m.win.style.height=h2+'px';
            m.c.width=Math.round(m.wpx*DPR); m.c.height=Math.max(2,Math.round((h2-bar)*DPR));
          }
        }
        const c=m.c, ctx=m.x, cw=c.width, ch=c.height;
        const vr=v.videoWidth/v.videoHeight, cr=cw/ch;
        let sw,sh,sxx,syy;
        if(vr>cr){ sh=v.videoHeight; sw=sh*cr; sxx=(v.videoWidth-sw)/2; syy=0; }
        else{ sw=v.videoWidth; sh=sw/cr; sxx=0; syy=(v.videoHeight-sh)/2; }
        ctx.drawImage(v, sxx,syy,sw,sh, 0,0,cw,ch);
      });
      requestAnimationFrame(paint);
    })();

    const X='<svg viewBox="0 0 12 12"><line x1="3.5" y1="3.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="3.5" x2="3.5" y2="8.5"/></svg>';
    const MINUS='<svg viewBox="0 0 12 12"><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';
    const PLUS='<svg viewBox="0 0 12 12"><line x1="6" y1="2.5" x2="6" y2="9.5"/><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';

    const _show=(w)=>{ if(!document.body.contains(w) || w.style.opacity==='1') return; w.style.opacity='1'; setTimeout(()=>{ w.style.pointerEvents=''; }, 820); };   // the mouse feels it only once it is SEEN
    // FIRST pass: the primaries arrive ONE BY ONE, in this fixed order —
    // crossing any hidden spot births the NEXT video in line (all its copies);
    // two spots in one move = two videos.
    const ORDER=[1,6,19,11,14,17,12];
    const PRIMARY=new Set(ORDER);
    let _orderIdx=0;
    const _revealed=new Set();   // which primaries have actually been born
    const _hiddenPrimaries=[];   // spots the mouse can still discover
    const _pool=[];              // hidden stack windows — the storm drains them in random order
    let _toneDucked=false;
    const _duckTone=()=>{   // the first birth pushes the broadcast far away
      if(_toneDucked || !songAudio) return; _toneDucked=true;
      const au=songAudio, from=au.volume, to=0.1, t0=performance.now();
      (function step(){
        const p=Math.min(1,(performance.now()-t0)/1500);
        au.volume=from+(to-from)*p;
        if(p<1) requestAnimationFrame(step);
      })();
    };
    const _revealVid=(vid)=>{
      _duckTone();
      _fx(vid);   // a birth is a sound — the voice depends on who is born
      // all copies of one video, a small staggered fade
      let k=0;
      mirrors.forEach(mm=>{
        if(mm.vid===vid && mm.win.style.opacity!=='1'){
          const w2=mm.win; setTimeout(()=>_show(w2), (k++)*140);
        }
      });
    };

    // SECOND level: once ALL the primaries are on screen the room goes WILD —
    // every second one more video lands: any video, a random size (sometimes
    // huge, sometimes tiny), a truly random spot. the hidden pre-placed stack
    // windows go first (shuffled); then fresh windows, up to a hard cap.
    let _mateT=null, _extraN=0;
    const EXTRA_CAP=30;   // fresh windows after the pool empties — then it rests
    let _tierBag=[];
    const _nextTier=()=>{
      if(!_tierBag.length){
        _tierBag=['H','M','M','S','S','S'];   // one huge, two medium, three small
        for(let i=_tierBag.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; const t=_tierBag[i]; _tierBag[i]=_tierBag[j]; _tierBag[j]=t; }
      }
      return _tierBag.pop();
    };
    const _wildPlace=(mm)=>{
      const tier=_nextTier();
      const wpx=Math.round(tier==='H' ? 700+Math.random()*400      // huge
                : tier==='M' ? 340+Math.random()*200               // medium
                : 130+Math.random()*140);                          // small
      const ar=VID_AR[mm.vid]||[4,3];
      const hpx=Math.round(wpx*ar[1]/ar[0])+26;
      mm.wpx=wpx; mm.sized=true;
      mm.win.style.width=wpx+'px'; mm.win.style.height=hpx+'px';
      mm.c.width=Math.max(2,Math.round(wpx*DPR)); mm.c.height=Math.max(2,Math.round((hpx-26)*DPR));
      mm.win.style.left=Math.round(Math.random()*(SW-wpx*0.6)-wpx*0.2)+'px';
      mm.win.style.top =Math.round(Math.random()*(SHh-hpx*0.6)-hpx*0.2)+'px';
      mm.win.style.zIndex=(100+(++z));
    };
    const _spawnExtra=()=>{
      const picks=usedVids.filter(v2=>v2!==21);
      const nv=picks[Math.random()*picks.length|0];
      const win=document.createElement('div');
      win.className='win';
      win._settled=true; win._brokenPart=true; win._brokenPartWin=true;
      win.style.opacity='0'; win.style.pointerEvents='none';
      win.style.transition='opacity .8s ease'; win.style.animation='none';
      win.innerHTML='<div class="bar roombar"><div class="dots">'+
        '<span class="dot" data-close>'+X+'</span>'+
        '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div></div>'+
        '<div class="roomstage" style="position:absolute;top:26px;left:0;right:0;bottom:0;width:auto;height:auto;padding:6px;overflow:hidden;border-radius:10px"></div>';
      document.body.appendChild(win);
      const cv=document.createElement('canvas');
      cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;border-radius:8px;pointer-events:none;';
      win.querySelector('.roomstage').appendChild(cv);
      const _m={ v:masters[nv], c:cv, x:cv.getContext('2d'), win:win, wpx:100, vid:nv, noBar:false };
      mirrors.push(_m); win._mirror=_m;
      win.classList.remove('trap'); win.style.cursor='default';
      win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);
      const dts=win.querySelectorAll('.dot');
      if(dts[0]) dts[0].addEventListener('click',(e)=>{ e.stopPropagation(); win.remove(); });
      if(dts[1]) dts[1].addEventListener('click',(e)=>{ e.stopPropagation(); win.classList.add('minimizing'); setTimeout(()=>win.remove(),400); });
      if(dts[2]) dts[2].addEventListener('click',(e)=>{ e.stopPropagation();
        win.style.zIndex=(100+(++z));
        win.style.transition='width .3s ease, height .3s ease, left .3s ease, top .3s ease';
        win.style.width=Math.round(parseInt(win.style.width)*1.4)+'px';
        win.style.height=Math.round(parseInt(win.style.height)*1.4)+'px'; });
      win.addEventListener('mousedown',()=>{ win.style.zIndex=(100+(++z)); });
      return _m;
    };
    const _startStorm=()=>{
      if(_mateT) return;
      _mateT=setInterval(()=>{
        let mm=null;
        while(_pool.length && !mm){
          const c2=_pool.splice(Math.random()*_pool.length|0,1)[0];
          if(document.body.contains(c2.win) && c2.win.style.opacity!=='1') mm=c2;
        }
        if(!mm){
          if(_extraN>=EXTRA_CAP){ clearInterval(_mateT); _mateT=null; return; }
          _extraN++; mm=_spawnExtra();
        }
        _wildPlace(mm);
        _fx(mm.vid);   // the storm speaks too
        _show(mm.win);
      }, 1000);
    };

    let _fbT=null;   // the 5s safety: mouse moving but the set never completes
    const _finishPrimaries=()=>{
      let k=0;
      ORDER.forEach(v2=>{ if(_revealed.has(v2)) return; _revealed.add(v2); setTimeout(()=>_revealVid(v2), (k++)*180); });
      _orderIdx=ORDER.length;
      removeEventListener('mousemove', _spotMv);
      if(_fbT){ clearTimeout(_fbT); _fbT=null; }
      _startStorm();
    };
    const _kickFb=()=>{
      if(_fbT) clearTimeout(_fbT);
      _fbT=setTimeout(_finishPrimaries, 5000);
    };
    let _spotArmed=false;   // spots wake only once the background has fully landed
    setTimeout(()=>{ _spotArmed=true; }, 1400);
    const _spotMv=(e)=>{
      if(!_spotArmed || _revealed.size>=ORDER.length) return;
      if(!_fbT) _kickFb();   // the clock starts with the first wander
      for(let i=_hiddenPrimaries.length-1;i>=0;i--){
        const hp=_hiddenPrimaries[i], w2=hp.win;
        if(!document.body.contains(w2)){ _hiddenPrimaries.splice(i,1); continue; }
        if(w2.style.opacity==='1'){ _hiddenPrimaries.splice(i,1); continue; }
        const r=w2.getBoundingClientRect();
        if(e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){
          _hiddenPrimaries.splice(i,1);              // this spot is spent
          // the spot births ITS OWN video, so a crossed spot is never wasted;
          // if that video already lives, the next unborn one in ORDER arrives.
          let v3=hp.vid;
          if(_revealed.has(v3)) v3=ORDER.find(v=>!_revealed.has(v));
          if(v3!=null){ _revealed.add(v3); _revealVid(v3); _kickFb(); }
        }
      }
      if(_revealed.size>=ORDER.length){
        removeEventListener('mousemove', _spotMv);
        if(_fbT){ clearTimeout(_fbT); _fbT=null; }
        _startStorm();
      }
    };
    addEventListener('mousemove', _spotMv);

    // ---- the birth effects: TWO mouth sounds, chosen by the video being born.
    //   rooms/something i said/fx1.m4a — videos 2,3,4,7,9,12,13,14,17,18
    //   rooms/something i said/fx2.m4a — all the others (21, the broadcast, is silent)
    // one short sound per birth, minimum gap; a missing/broken file stays
    // silently quiet after one console warning.
    const FX1=new Set([2,3,4,7,9,12,13,14,17,18]);
    const _fxP={};
    let _fxLast=0;
    const _mkFx=(name)=>{ const P={pool:[],i:0,fails:0};
      for(let k=0;k<4;k++){
        const a=new Audio(dir+'/'+name+'.m4a');
        a.addEventListener('error',()=>{ if(++P.fails===1) console.warn('fx missing/broken: '+dir+'/'+name+'.m4a'); });
        _allAudio.push(a); P.pool.push(a);
      } return P; };
    _fxP.fx1=_mkFx('fx1'); _fxP.fx2=_mkFx('fx2');
    const _fx=(vid)=>{
      if(vid===21) return;                          // the broadcast itself is silent
      const P=FX1.has(vid) ? _fxP.fx1 : _fxP.fx2;
      if(P.fails>=4) return;
      const now=performance.now();
      if(now-_fxLast<150) return;
      _fxLast=now;
      const a=P.pool[P.i++%P.pool.length];
      try{ a.currentTime=0; a.volume=0.55; a.play().catch(()=>{}); }catch(_){ } };

    // the room's sound plays in the BACKGROUND — no player window.
    // (in THIS room it's the broadcast test tone, saved as sound.m4a.)
    let songAudio=null;
    const mkSongAt=(px,py,at)=>{   // keeps its call sites; px/py are ignored now
      const au=new Audio(dir+'/sound.m4a');
      au.loop=true; _allAudio.push(au); songAudio=au; _roomSongs.push(au);
      const tryPlay=()=>au.play().catch(()=>{});
      tryPlay();                                    // starts WITH the broadcast
      addEventListener('mousedown', tryPlay, {once:true});
    };

    INSTANCES.forEach((inst)=>{
      const [ix,iy,iw,ih,ivid]=inst;
      if(ivid===0){ mkSongAt(Math.round(ix*sx), Math.round(iy*sy), 1200); return; }
      const win=document.createElement('div');
      win.className='win';
      win._settled=true; win._brokenPart=true; win._brokenPartWin=true;
      const fullBg=(ivid===21);
      const noBar=fullBg;   // the background is the room itself — no title strip
      let wpx, hpx;
      if(fullBg){ wpx=SW; hpx=SHh; }
      else{
        wpx=Math.round(iw*ss);
        const ar=VID_AR[ivid]||[iw,ih];
        hpx=Math.round(wpx*ar[1]/ar[0]) + 26;
      }
      win.style.width=wpx+'px'; win.style.height=hpx+'px';
      win.style.left=(fullBg?0:Math.round(ix*sx))+'px'; win.style.top=(fullBg?0:Math.round(iy*sy))+'px';
      if(fullBg){ win.style.borderRadius='0'; win.style.boxShadow='none'; win.style.border='none'; win.style.background='#000'; win.style.maxWidth='none'; win.style.maxHeight='none'; }
      win.style.zIndex=(100+(++z));   // 100+ opens OVER the console (#syslog z:90)
      win.style.opacity='0'; win.style.pointerEvents='none';   // hidden windows must not eat the mouse
      win.style.transition='opacity .8s ease';
      win.style.animation='none';   // the .win pop keyframe would flash every hidden window

      win.innerHTML='<div class="bar roombar"><div class="dots">'+
        '<span class="dot" data-close>'+X+'</span>'+
        '<span class="dot">'+MINUS+'</span><span class="dot">'+PLUS+'</span></div></div>'+
        '<div class="roomstage" style="position:absolute;top:26px;left:0;right:0;bottom:0;width:auto;height:auto;padding:6px;overflow:hidden;border-radius:10px"></div>';
      document.body.appendChild(win);
      const stage=win.querySelector('.roomstage');
      if(noBar){ win.querySelector('.bar').style.display='none'; stage.style.top='0'; stage.style.padding='0'; stage.style.borderRadius='0'; }

      const cv=document.createElement('canvas');
      // buffer at DEVICE pixels (retina), css size stays.
      const cw=Math.max(2, Math.round(wpx*DPR)), ch=Math.max(2, Math.round((hpx-(noBar?0:26))*DPR));
      cv.width=cw; cv.height=ch;
      cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;'+
        (noBar?'':'border-radius:8px;')+'pointer-events:none;';
      stage.appendChild(cv);
      const _m={ v:masters[ivid], c:cv, x:cv.getContext('2d'), win:win, wpx:wpx, vid:ivid, noBar:noBar, fullBg:fullBg };
      mirrors.push(_m); win._mirror=_m;
      if(ivid===20) _relic20=win;   // the small window that stays at the end
      if(fullBg){
        _bgWin=win;
        setTimeout(()=>{ win.style.opacity='1'; win.style.pointerEvents='none'; win.style.cursor='default'; }, 300);   // shown WITHOUT _show — _show would hand the mouse back after its fade delay. the broadcast stays dead to the mouse forever
      } else if(PRIMARY.has(ivid)){
        _hiddenPrimaries.push({win:win, vid:ivid});   // waits for the mouse to cross its spot
      } else {
        _pool.push(_m);   // the stacks join the storm, in random order
      }

      win.classList.remove('trap');
      win.style.cursor='default';
      win.style.cursor=MOVECUR; win._zPinned=true; dragify(win, win);   // drags from anywhere; NEVER self-raises above the room — each room's own z policy rules
      addResize(win);
      const dots=win.querySelectorAll('.dot');
      if(dots[0]){
        const c=dots[0].cloneNode(true); dots[0].parentNode.replaceChild(c, dots[0]);
        c.addEventListener('click',(e)=>{ e.stopPropagation(); win.remove(); });
      }
      if(dots[1]){
        const c=dots[1].cloneNode(true); dots[1].parentNode.replaceChild(c, dots[1]);
        c.addEventListener('click',(e)=>{ e.stopPropagation();
          win.classList.add('minimizing');
          setTimeout(()=>win.remove(), 400); });
      }
      if(dots[2]){
        const c=dots[2].cloneNode(true); dots[2].parentNode.replaceChild(c, dots[2]);
        c.addEventListener('click',(e)=>{ e.stopPropagation();
          win.style.zIndex=(100+(++z));
          // grow the STAGE proportionally: the bar height is fixed, so scaling
          // the whole window warps the video (object-fit:fill). scale the body
          // only and add the bar back — the video aspect never changes.
          const _bh=win.querySelector('.bar')?.offsetHeight||0;
          const _W0=win.offsetWidth, _H0=win.offsetHeight;
          win.style.transition='width .3s ease, height .3s ease';
          win.style.width=Math.round(_W0*1.4)+'px';
          win.style.height=Math.round(_bh+(_H0-_bh)*1.4)+'px'; });
      }
      win.addEventListener('mousedown',()=>{ win.style.zIndex=(100+(++z)); });
    });

    if(title){
      _logLine('==============================', 'dim');
      _logLine('I left it on the desktop. small enough to keep.', 'say');
      _logLine('it stays there now. I can open it again whenever I want. I probably will.', 'say');
      _logLine('==============================', 'dim');
    }
    // clicking a planted folder: wipe the herd, keep ONE small window still
    // playing — video 20.
    window._onPlantedFolderClick=()=>{
      (function(){ const br=document.getElementById('brand'); if(br) br.style.zIndex=''; })();
      _roomSongs.forEach(au=>{ try{ au.pause(); }catch(_){} });
      document.querySelectorAll('.win.songwin').forEach(w=>{ if(!w._thisRoomSong) return;
        if(w._roomAudio){ try{ w._roomAudio.pause(); }catch(_){} } w.remove(); });
      const wins=[...document.querySelectorAll('.win')].filter(w=>w._brokenPartWin && !w._relicShrunk && !w._keepRelic && document.body.contains(w));
      let keep=(_relic20 && document.body.contains(_relic20)) ? _relic20 : ((_bgWin && document.body.contains(_bgWin)) ? _bgWin : null);
      if(!keep){ let best=Infinity; wins.forEach(w=>{ const ar2=w.offsetWidth*w.offsetHeight; if(ar2<best){ best=ar2; keep=w; } }); }
      wins.forEach(w=>{ if(w!==keep) w.remove(); });
      if(keep && keep._mirror){
        const km=keep._mirror;
        km.v.classList.remove('brokenBgText');
        mirrors.splice(0, mirrors.length, km);
        Object.values(masters).forEach(v=>{ if(v!==km.v){ try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(_){} v.remove(); } });
      }
      if(keep){
        // if the survivor lives without a title bar, the small relic gets its bar back.
        if(keep._mirror && keep._mirror.noBar){
          keep._mirror.noBar=false; keep._mirror.fullBg=false;
          const kb=keep.querySelector('.bar'); if(kb) kb.style.display='';
          const kst=keep.querySelector('.roomstage'); if(kst){ kst.style.top='26px'; kst.style.padding='6px'; kst.style.borderRadius='10px'; }
          const kcv=keep.querySelector('canvas'); if(kcv) kcv.style.borderRadius='8px';
        }
        keep._relicShrunk=true;

    })();

// arc room: opens straight in its final small form.
// clicks inside cycle the videos in a loop (last -> back to first).
function openRoomArc(dir, emotion, title){
  probeVideos(dir, (count)=>{
    const stages=[];
    for(let i=1;i<=count;i++) stages.push(i);
    const win=buildRoomWin(title);
    const stage=win.querySelector('.roomstage');
    let idx=0;
    const showStage=()=>{
      const cur=stages[idx];
     const olds=[...stage.children];              // the outgoing video + its overlays
      olds.forEach(o=>{ if(o.classList) o.classList.remove('eyelayer'); });   // retire the old layer
      if(typeof armAuto==='function') armAuto();
      const face = ARC_FACE[dir];
      const isEyeVid = !!(face && face.vid===cur);
      const isCircle = !!(face && face.allVids && face.mode==='circle');
      const v=document.createElement('video');
      v.muted=true; v.playsInline=true; v.autoplay=true; v.controls=false;
      v.loop=!isEyeVid;
      v.setAttribute('muted','');
      const tryPlay=()=>{ v.play().catch(()=>{}); };
      v.addEventListener('loadeddata', tryPlay);
      v.addEventListener('canplay', tryPlay);
      v.src=dir+'/'+cur+'.mp4';
      v.style.opacity='0'; v.style.transition='opacity .8s ease';
      stage.appendChild(v);
      styleRoomMedia(win, v);
      tryPlay();
      requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ v.style.opacity='1'; }); });
      setTimeout(()=>{ olds.forEach(o=>o.remove()); }, 900);
      if(isEyeVid){
        if(face.mode==='fear') setTimeout(()=> bloomEyes(stage), 2000);
        else if(face.mode==='mouth') setTimeout(()=> bloomMouth(stage), 1500);
      }
      if(isCircle){
        const fxByVid = {1:'gray', 2:'tired', 3:'inverted', 4:'anger'};
        setTimeout(()=> bloomCircle(stage, fxByVid[cur] || 'gray', idx===stages.length-1), 800);
      }
    };
    // the room lives on its own — advances by itself every ~30s (a click still works)
    let autoT=null;
    const armAuto=()=>{ clearTimeout(autoT);
      autoT=setTimeout(()=>{ if(!document.body.contains(win)) return;
        idx=(idx+1)%stages.length; showStage(); }, 18000+Math.random()*4000); };
    let downX=0, downY=0;
    win.addEventListener('mousedown',(e)=>{ downX=e.clientX; downY=e.clientY; });
    stage.addEventListener('click',(e)=>{
      const moved = Math.abs(e.clientX-downX) + Math.abs(e.clientY-downY);
      if(moved > 6) return;
      idx=(idx+1)%stages.length;
      showStage();
    });
    showStage();
    armAuto();
  });
}

// probe how many N.mp4 exist in a room dir, sequentially from 1
// no relic, in ANY room, is allowed to sit on the feel.exe word (top-left).
function relicAvoidBrand(keep){
  if(keep.offsetLeft<300 && keep.offsetTop<120) keep.style.top='130px';
}
function probeVideos(dir, done){
  if(window._prefetchBoost) window._prefetchBoost(dir);   // this room's files jump the download queue NOW
  // ALL 12 existence checks fire in PARALLEL, downloading nothing — the old way
  // loaded every video one after another and stalled hosted rooms for ~10s.
  const checks=[];
  for(let i=1;i<=12;i++){
    checks.push(fetch(dir+'/'+i+'.mp4', {method:'HEAD', cache:'force-cache'})
      .then(r=>r.ok).catch(()=>false));
  }
  Promise.all(checks).then(oks=>{
    let n=0; for(let i=0;i<12;i++){ if(oks[i]) n=i+1; else break; }
    done(n);
  });
}

function bloomCircle(stage, fx, isLast){
  if(!camOK || !video || video.readyState<2) return;
  const FILTERS = {
    gray:     'grayscale(1) contrast(1.1)',
    tired:    'brightness(.6) blur(2px)',
    inverted: 'invert(1) contrast(1.25)',
    anger:    'saturate(2.4) hue-rotate(-12deg) contrast(1.3)',
  };
  // locked position & size, as a % of the IMAGE — it scales and moves with it
  const lay=eyeLayerFor(stage);
  if(lay===stage){ setTimeout(()=>bloomCircle(stage,fx,isLast), 500); return; }   // image not measured yet
  const X_PCT=60.7, Y_PCT=42.48, SIZE_PCT=15.52, TALLER=1.01;
  const wrap=document.createElement('div'); wrap.className='cam-eye';
  wrap.style.width=SIZE_PCT+'%';
  wrap.style.aspectRatio='1 / '+TALLER;
  wrap.style.height='auto';
  wrap.style.left=X_PCT+'%'; wrap.style.top=Y_PCT+'%';
  wrap.style.transform='translate(-50%,-50%)';
  wrap.style.borderRadius='50%';
  wrap.style.overflow='hidden';
  wrap.style.border='none'; wrap.style.boxShadow='none';
  wrap.style.pointerEvents='none'; wrap.style.cursor='default';
  wrap.style.filter = FILTERS[fx] || FILTERS.gray;
  const W=300, H=Math.round(300*TALLER);
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  cv.style.borderRadius='50%'; cv.style.width='100%'; cv.style.height='100%'; cv.style.display='block';
  wrap.appendChild(cv); lay.appendChild(wrap);
  const cx=cv.getContext('2d');
  wrap._isBodyCircle=true;
  (function loop(){
    if(!document.body.contains(wrap)) return;
    if(wrap._frozen) return;   // frozen on settle — last frame stays
    if(camOK && video && video.readyState>=2){
      const vw=video.videoWidth||640, vh=video.videoHeight||480;
      const cw=cv.width, ch=cv.height;
      if(_glitchOn){
        cx.globalCompositeOperation='destination-out';
        cx.fillStyle='rgba(0,0,0,0.09)'; cx.fillRect(0,0,cw,ch);
        cx.globalCompositeOperation='source-over';
      }
      cx.save(); cx.scale(-1,1);
      cx.globalAlpha=_glitchOn?0.5:1;
      const scale=Math.max(cw/vw, ch/vh);
      const dw=vw*scale, dh=vh*scale;
      cx.filter=_glitchOn?'grayscale(1) contrast(1.4) brightness(.85)':'none';
      cx.drawImage(video, -(cw+dw)/2, (ch-dh)/2, dw, dh);
      cx.filter='none';
      cx.restore();
      loop._g=(loop._g||0)+1;
      if(loop._g%3===0) glitchPass(cx, cv, cw, ch);
    }

// ONE live mouth, draggable, placed center — drag it onto the white mouth.
function bloomMouth(stage){
  if(!camOK || !video || video.readyState<2) return;
  const c = EYE_CROPS.mouth;
  const lay=eyeLayerFor(stage);
  if(lay===stage){ setTimeout(()=>bloomMouth(stage), 500); return; }
  const MX_PCT=50, MY_PCT=35, MSIZE_PCT=34;      // position & width as % of the image
  const W = 360, H = W*0.6;
  const wrap=document.createElement('div'); wrap.className='cam-eye';
  wrap.style.width=MSIZE_PCT+'%';
  wrap.style.aspectRatio='1 / 0.6'; wrap.style.height='auto';
  wrap.style.left=MX_PCT+'%'; wrap.style.top=MY_PCT+'%';
  wrap.style.transform='translate(-50%,-50%)';
  wrap.style.pointerEvents='none'; wrap.style.cursor='default';   // locked, like the circle
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  cv.style.width='100%'; cv.style.height='100%'; cv.style.display='block';
  wrap.appendChild(cv); lay.appendChild(wrap);
  const cx=cv.getContext('2d');
  (function loop(){
    if(!document.body.contains(wrap)) return;
    if(camOK && video && video.readyState>=2){
      const vw=video.videoWidth||640, vh=video.videoHeight||480;
      const sxc=vw*c.sx, swc=vw*c.sw, syc=vh*c.sy, shc=vh*c.sh;
      if(_glitchOn){
        cx.globalCompositeOperation='destination-out';
        cx.fillStyle='rgba(0,0,0,0.09)'; cx.fillRect(0,0,W,H);
        cx.globalCompositeOperation='source-over';
      }
      cx.save(); cx.scale(-1,1);
      cx.globalAlpha=_glitchOn?0.5:1;
      cx.filter=_glitchOn?'grayscale(1) contrast(1.4) brightness(.85)':'none';
      cx.drawImage(video, sxc,syc, swc,shc, -W,0, W,H);
      cx.filter='none';
      cx.restore();
      loop._g=(loop._g||0)+1;
      if(loop._g%3===0) glitchPass(cx, cv, W, H);
    }
    requestAnimationFrame(loop);
  })();
  // drag it freely inside the stage
  let on=false, ox=0, oy=0;
  wrap.addEventListener('mousedown',(e)=>{
    on=true; wrap.style.cursor='grabbing';
    wrap.style.transform='none';
    const r=stage.getBoundingClientRect();
    ox=e.clientX - (wrap.offsetLeft); oy=e.clientY - (wrap.offsetTop);
    e.preventDefault(); e.stopPropagation();
  });
  addEventListener('mousemove',(e)=>{
    if(!on) return;
    wrap.style.left=(e.clientX-ox)+'px';
    wrap.style.top=(e.clientY-oy)+'px';
  });
  addEventListener('mouseup',()=>{ if(on){ on=false; wrap.style.cursor='grab'; } });
  return wrap;
}

// a transparent layer that sits exactly on the room image and moves with it.
// eyes live inside it, so they are spread over the WHOLE image, not the window.
function eyeLayerFor(stage){
  const m=stage.querySelector('video,img');
  if(!m || !m.offsetWidth) return stage;
  let lay=stage.querySelector('.eyelayer');
  if(!lay){
    lay=document.createElement('div'); lay.className='eyelayer';
    lay.style.cssText='position:absolute;left:50%;top:50%;pointer-events:none;';
    stage.appendChild(lay);
  }
  lay.style.width=m.offsetWidth+'px'; lay.style.height=m.offsetHeight+'px';
  lay.style.transform=m.style.transform||'translate(-50%,-50%)';
  return lay;
}

function dragify(el,handle){

    el._dragSavedTransition=el.style.transition; el.style.transition='none';

function addResize(el){
  const dirs=['n','s','e','w','ne','nw','se','sw'];
  dirs.forEach(d=>{
    const h=document.createElement('div'); h.className='rz rz-'+d;
    el.appendChild(h);
    h.addEventListener('mousedown',e=>{
      e.preventDefault(); e.stopPropagation();
      el._userResized=true;               // they got the hint — stop the breathing
      el.style.zIndex=(++z);
      const sx=e.clientX, sy=e.clientY;
      // transitions left by grow/shrink code make resizing fight the hand — suspend
      const _savedTr=el.style.transition; el.style.transition='none';
      const sw=el.offsetWidth, sh=el.offsetHeight;
      const sl=el.offsetLeft, st=el.offsetTop;
      const MINW=90, MINH=90;
      // rooms stop growing exactly at the edge of the image inside
      const mm=el._settledRoom ? el.querySelector('.roomstage img,.roomstage video') : null;
      const MAXW=mm ? mm.offsetWidth+20 : Infinity;
      const MAXH=mm ? mm.offsetHeight+20 : Infinity;
      // windows with a picture inside (camera eyes, room videos, relics) may
      // NEVER be warped: any handle scales the whole window by ONE factor,
      // bar excluded, so the image aspect is untouchable. settled rooms are a
      // viewport over a fixed image (cropping, not warping) — they stay free.
      const lockAR = el.classList.contains('eye') || el._relicShrunk || el._giveRelic
        || (!el._settledRoom && !!el.querySelector('.roomstage video, .roomstage canvas, .body > canvas'));
      const barEl=el.querySelector('.bar');
      const bh=(barEl && getComputedStyle(barEl).display!=='none') ? barEl.offsetHeight : 0;
      const move=ev=>{
        const dx=ev.clientX-sx, dy=ev.clientY-sy;
        if(lockAR){
          let f = (d==='n'||d==='s') ? ((d==='s'?sh+dy:sh-dy)/sh) : ((d.includes('e')?sw+dx:sw-dx)/sw);
          f=Math.max(MINW/sw, Math.min(f, MAXW/sw, MAXH/Math.max(1,sh)));
          const W=Math.round(sw*f), H=Math.round(bh+(sh-bh)*f);
          el.style.width=W+'px'; el.style.height=H+'px';
          if(d.includes('w')) el.style.left=(sl+(sw-W))+'px';
          if(d.includes('n')) el.style.top=(st+(sh-H))+'px';
        } else {
          if(d.includes('e')){ el.style.width=Math.min(MAXW,Math.max(MINW,sw+dx))+'px'; }
          if(d.includes('s')){ el.style.height=Math.min(MAXH,Math.max(MINH,sh+dy))+'px'; }
          if(d.includes('w')){ const nw=Math.min(MAXW,Math.max(MINW,sw-dx));
            el.style.width=nw+'px'; el.style.left=(sl+(sw-nw))+'px'; }
          if(d.includes('n')){ const nh=Math.min(MAXH,Math.max(MINH,sh-dy));
            el.style.height=nh+'px'; el.style.top=(st+(sh-nh))+'px'; }
        }
        if(el._applyImg) el._applyImg();
      };
      const up=()=>{ el.style.transition=_savedTr; removeEventListener('mousemove',move); removeEventListener('mouseup',up); };
      addEventListener('mousemove',move); addEventListener('mouseup',up);
    });
  });
}
