// the meltdown. each trapped folder gets a RANDOM "flavor" so no two feel the same:
//  - 'songs'   : only songs stacking, almost nothing else
//  - 'thoughts': only thoughts, writing over and over
//  - 'qa'      : only questions answering themselves
//  - 'mixed'   : a bit of everything
//  - 'sparse'  : missing something — quiet, just a few eyes
function breakSystem(fromWin, talk, label){
  const body=document.body;
  const timers=[];

  // pick a flavor. talk:true folders lean toward thought/qa/mixed; quiet ones toward songs/sparse.
  const flavor = talk
    ? ['thoughts','qa','mixed','mixed'][Math.random()*4|0]
    : ['songs','songs','sparse','mixed'][Math.random()*4|0];


  // the error message clones itself across the screen, like a window that won't die
  const errText = (TRAPPED[Object.keys(TRAPPED).find(k=>1)] && fromWin) ?
    (fromWin.querySelector('.log')?.textContent || "It will not open.") : "It will not open.";
  // the error cascades from where it started — each copy a little down-and-right,
  // piling on top of the last, like a window that keeps spawning itself.
  let _cx = fromWin ? fromWin.offsetLeft : innerWidth/2-180;
  let _cy = fromWin ? fromWin.offsetTop  : 120;
  // the error's own voice: a curt two-pulse denial buzz — one per clone.
  // low square wave, "eh-eh" — refusal, not a Windows ding. pitch wanders a
  // little per window so the pile never sounds mechanical.
  const errBuzz=()=>{
    try{
      const ac=_uiCtx(), t=ac.currentTime;
      const f=150+Math.random()*40;
      [0,0.09].forEach(dt=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='square'; o.frequency.setValueAtTime(f, t+dt);
        g.gain.setValueAtTime(0.07, t+dt);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.06);
        o.connect(g); g.connect(ac.destination);
        o.start(t+dt); o.stop(t+dt+0.07);
      });
    }catch(e){}
  };
  errBuzz();   // the first denial sounds the moment "open anyway" breaks the system
  const cloneMsg=()=>{
    errBuzz();
    const w=makeWin('trap','',340);
    w.classList.add('trapdoor');
    w.style.pointerEvents='none';
    _cx += 22 + Math.random()*8;   // step down-right each time
    _cy += 20 + Math.random()*8;
    if(_cx > innerWidth-360 || _cy > innerHeight-160){   // wrap back to a fresh start
      _cx = 40 + Math.random()*120;

let _plantCount=0;

function buildPlantPool(){
  if(_plantPool.length) return;
  // pull from the big desktop name list + EXTRA + trapped names, minus what's placed
  const all=[];
  FOLDERS.forEach(f=> all.push(f.label.replace(/<br>/g,' ')));
  EXTRA.forEach(n=> all.push(n));
  Object.keys(TRAPPED).forEach(n=> all.push(n));
  const seen={};
  all.forEach(n=>{ const k=n.replace(/[\u2019`]/g,"'"); if(!seen[k]){ seen[k]=1; _plantPool.push(n); } });
}

// find a spot for a planted folder that doesn't land on top of any window on screen
function clearFolderSpot(w,h){
  // every visible window counts — room panels, relics, players, anything.
  // (room panels are no longer flagged _settledRoom, so filtering by that missed them.)
  const rooms=[...document.querySelectorAll('.win')].filter(r=>r.offsetWidth && r.offsetHeight);
  // folders already planted count too — a tight desktop must SCATTER the batch,
  // never drop every folder onto the exact same "least bad" spot.
  document.querySelectorAll('.folder.topfolder').forEach(f=>{ if(f.offsetWidth) rooms.push(f); });
  const hits=(sp,pad)=> rooms.some(r=>{
    const rx=r.offsetLeft, ry=r.offsetTop, rw=r.offsetWidth, rh=r.offsetHeight;
    return sp.x < rx+rw+pad && sp.x+w > rx-pad && sp.y < ry+rh+pad && sp.y+h > ry-pad;
  });
  // first pass: a comfortable margin. then progressively tighter, rather than
  // giving up and dropping the folder straight onto a window.
  for(const pad of [30, 14, 4, 0]){
    for(let tries=0; tries<60; tries++){
      const sp=randomSpot(w,h);
      if(!hits(sp,pad)) return sp;
    }
  }
  // random tries can miss small empty pockets in a dense layout — walk a grid
  // over the whole desktop and take a spot with truly nothing under it.
  {
    const maxX=Math.max(10, innerWidth - w - 20), maxY=Math.max(60, innerHeight - h - 120);
    const open=[];
    for(let gy=55; gy<=maxY; gy+=40){
      for(let gx=10; gx<=maxX; gx+=40){
        if(!hits({x:gx,y:gy},4)) open.push({x:gx,y:gy});
      }
    }
    if(open.length) return open[Math.random()*open.length|0];
  }
  // genuinely nowhere clear — fall back to the spot furthest from any window,
  // with a random scatter so two folders never land on the exact same point.
  let best=null, bestClear=-1;
  for(let tries=0; tries<40; tries++){
    const sp=randomSpot(w,h);
    let near=Infinity;
    rooms.forEach(r=>{
      const dx=(r.offsetLeft+r.offsetWidth/2)-(sp.x+w/2), dy=(r.offsetTop+r.offsetHeight/2)-(sp.y+h/2);
      near=Math.min(near, Math.sqrt(dx*dx+dy*dy));
    });
    if(near>bestClear){ bestClear=near; best=sp; }
  }
  best=best||randomSpot(w,h);
  best.x=Math.max(10, Math.min(document.documentElement.clientWidth-w-20, best.x+(Math.random()*160-80)));
  best.y=Math.max(55, Math.min(innerHeight-h-120,                          best.y+(Math.random()*160-80)));
  return best;
}

// classify a folder name into a type, so a batch can vary its kinds
const FOLDER_TYPES={
  // Lenda's fixed taxonomy — the batch mixer counts THESE groups
  'Everything I gave you':'parent','Reasons I stayed':'parent','The mornings I':'parent',
  "Things I said and didn't":'parent','When I looked at myself I saw':'parent','What my body kept':'parent',
  'The day I started leaving':'parent','The nights I':'parent','When the pain stopped':'parent',"Who I'm becoming":'parent',
  'I called it love because':'maze','The fear it comes back':'maze',"I pretend I'm okay so":'maze',"The person I'm becoming":'maze',
  'I forgave too quickly because':'questions','I stopped asking why because':'questions','Someone I stopped recognizing':'questions',
  'I hated you out loud':'song',"Songs I can't listen to":'song','The moment I gave up':'song',
  'Things I buried so':'chain','Every song led me deeper':'chain',
  'I was scared to feel this good':'solo','I played it on repeat until':'solo','The silence after':'solo',
  'I never sent it':'trap','I still flinch when':'trap','Feelings I deleted before':'trap',
  "Places I don't go anymore":'trap',"The future I can't picture":'trap',
};
function folderType(label){
  const norm=s=>s.replace(/[’`<]/g,"'").replace(/<br>/g,' ');
  const n=norm(label);
  if(FOLDER_TYPES[n]) return FOLDER_TYPES[n];
  if(TRAPPED[label] || Object.keys(TRAPPED).some(k=>norm(k)===n)) return 'trap';
  const core=FOLDERS.find(f=>norm(f.label)===n);
  if(!core) return 'simple';
  if(core.children) return 'parent';
  const j=core.journey||[];
  if(j.some(s=>s.t==='folder')) return 'chain';   // folder-chains are their own kind — even when they also carry songs
  if(j.some(s=>s.t==='maze')) return 'maze';
  if(j.some(s=>s.t==='cutsong'||s.t==='song'||s.t==='solo')) return 'song';
  if(j.some(s=>s.t==='think'||s.t==='tapimg')) return 'camera';
  if(j.some(s=>s.t==='choice')) return 'questions';
  return 'simple';
}

function plantFolder(avoidType){
  buildPlantPool();
  let label;
  {
    // round-robin over folder types: each round every remaining type appears
    // once (random order, random name within it) before any type repeats.
    let fresh=_plantPool.filter(n=> _planted.indexOf(n)===-1);
    if(!fresh.length){ _planted.length=0; fresh=_plantPool.slice(); }   // pool spent -> recycle, never go silent
    const typesLeft=fresh.map(n=>folderType(n));
    let pick=fresh.filter(n=> _typeCycle.indexOf(folderType(n))===-1);
    if(!pick.length){
      // every type still in the pool has been used this round — start a new
      // round, keeping only the last planted type so no two of the same kind
      // ever land back to back across the boundary.
      const last=_typeCycle[_typeCycle.length-1];
      _typeCycle=typesLeft.indexOf(last)!==-1 && typesLeft.some(t=>t!==last) ? [last] : [];
      pick=fresh.filter(n=> _typeCycle.indexOf(folderType(n))===-1);
      if(!pick.length) pick=fresh;       // only one type remains — no choice
    }
    label=pick[Math.random()*pick.length|0];
    _typeCycle.push(folderType(label));
  }
  _plantCount++;
  _planted.push(label);
  uiPlant();

  const el=document.createElement('div'); el.className='folder topfolder';
  const sp=clearFolderSpot(170,120);
  el.style.left=sp.x+'px'; el.style.top=sp.y+'px';
  const FX='<svg viewBox="0 0 12 12"><line x1="3.5" y1="3.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="3.5" x2="3.5" y2="8.5"/></svg>';
  const FMIN='<svg viewBox="0 0 12 12"><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';
  const FPLU='<svg viewBox="0 0 12 12"><line x1="6" y1="2.5" x2="6" y2="9.5"/><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>';
  el.innerHTML='<div class="bar roombar fbar" style="display:none;position:relative;width:100%;height:22px;margin-bottom:6px">'+
    '<div class="dots"><span class="dot" data-fx>'+FX+'</span>'+
    '<span class="dot" data-fm>'+FMIN+'</span><span class="dot" data-fp>'+FPLU+'</span></div></div>'+
    '<div class="ico">'+FOLDER_SVG+'</div><div class="lbl">'+label+'</div>';
  document.body.appendChild(el);
  el.querySelector('[data-fx]').addEventListener('click',(e)=>{ e.stopPropagation(); el.remove(); });
  el.querySelector('[data-fm]').addEventListener('click',(e)=>{ e.stopPropagation();
    el.style.transition='opacity .35s ease'; el.style.opacity='0'; setTimeout(()=>el.remove(), 380); });
  el.querySelector('[data-fp]').addEventListener('click',(e)=>{ e.stopPropagation();
    el.style.transform='scale(1.15)'; });
  if(window._autoBeacon) el.classList.add('beacon');   // pulses warm above the room, like the fear beacons
  el.style.opacity='0'; _deskEls.push(el);
  dragify(el,el);
  // a click is a click even if the hand trembles — only a real drag cancels
  // the open. (an any-mousemove flag eats most clicks under the flood.)
  dblOpen(el, ()=>{   // 12px: a click is a click even if the hand trembles under the flood
    flushSummary();   // the room is closing into its small self — NOW its summary is written
    if(typeof window._onPlantedFolderClick==='function') window._onPlantedFolderClick();
    // the room is over: EVERY sound of it stops — songs, tones, radios, pings.
    // the kept relic window plays on silently (its video is muted anyway);
    // the next room starts its own audio from scratch.
    // stop EVERY sound — and keep it stopped: rooms with fx rotations / loop
    // timers (like "when they stopped looking at me") try to restart their
    // audio moments later. killing play() on every EXISTING element makes any
    // late restart a silent no-op. the next room creates fresh audio — unaffected.
    _allAudio.forEach(a=>{ try{ a.pause(); a.play=()=>Promise.resolve(); }catch(_){} });
    // leaving the room: planted folders stop riding above everything.
    // topfolder is a ROOM-ONLY privilege — journeys and folder windows open above them.
    document.querySelectorAll('.folder.topfolder').forEach(f=>f.classList.remove('topfolder'));
    document.querySelectorAll('.folder.beacon').forEach(f=>f.classList.remove('beacon'));
    const norm=s=>s.replace(/[’`]/g,"'");
    if(TRAPPED[label] || Object.keys(TRAPPED).some(k=>norm(k)===norm(label))){ openTrappedRoom(label, el); return; }
    const core=FOLDERS.find(f=>norm(f.label.replace(/<br>/g,' '))===norm(label));
    if(core && core.journey){ startJourney(core.journey, core.label, core.fall, core.cam, core.endEmo, core.fearRoom, core.intro); }
    else if(core){ openFolder(core); }
    else openSimple(label);
  }, 12);
 setTimeout(()=>{ el.style.transition='opacity .8s ease'; el.style.opacity='1'; }, 60);
 // add this folder to the current white batch (plantBatch cleared the previous batch)
  el.classList.add('planted-new');
  return folderType(label);
}

  const ly=[8,19,30,41,52,63,74,85];

  for(let r=0;r<4;r++) for(let c=0;c<3;c++){
    const jx=(lrnd()-0.5)*55, jy=(lrnd()-0.5)*5;

  let seed=98765;

  const mcols=7, mrows=7;

        '<span style="width:22px;height:22px;border-radius:50%;border:1px solid rgba(120,120,120,.55)"></span>'+
        '<span style="width:22px;height:22px;border-radius:50%;border:1px solid rgba(120,120,120,.55)"></span>'+
        '<span style="color:rgba(255,255,255,.85);font-size:16px;margin-left:6px;letter-spacing:.4px">Feel.exe</span>'+
      '</div>'+
      '<div style="padding:10px 30px 20px;text-align:center;color:rgba(255,255,255,.85)">'+
  '<div style="font-size:18px;line-height:1.6;margin-bottom:30px;color:rgba(255,255,255,.7)">'+
          'Drag Feel.exe into ME</div>'+
        '<div style="display:flex;align-items:center;justify-content:center;gap:26px">'+
          '<div id="fileItem" style="cursor:grab;text-align:center">'+
            '<div style="width:88px;height:108px;display:flex;align-items:flex-end;justify-content:center;margin:0 auto 14px">'+FILE_SVG+'</div>'+
            '<div style="font-size:14px;color:rgba(255,255,255,.85)">Feel.exe</div></div>'+
          '<div style="font-size:30px;color:rgba(255,255,255,.4)">&#10142;</div>'+
          '<div id="meItem" style="text-align:center">'+
            '<div style="width:104px;height:108px;display:flex;align-items:flex-end;justify-content:center;margin:5px auto 8px">'+ME_SVG+'</div>'+
            '<div style="font-size:14px;color:rgba(255,255,255,.85)">ME</div></div>'+
        '</div>'+
      '</div>'+
      '<div style="padding:16px;text-align:center;color:rgba(255,255,255,.4);font-size:13px">'+
        'It then becomes part of me</div>'+
    '</div>');
  document.body.appendChild(scr);
  sysLog('feel.exe (1.0) starting...');

  // ---- boot terminal: typed lines, then video, then the install window ----
  const BOOT_LINES=[
    'feel.exe v1.0',
    'initializing...',
    'checking hardware... [ OK ]',
    'checking memory... [ OK ]',
    'checking old memories... [ OK ]',
    'loading drivers... [ OK ]',
    'mounting /me... [ OK ]',
    'locating user... [ OK ]',
    'user found.',
    'you were always here.',
    'starting feel.exe...'
  ];
  const cursor=document.createElement('span');
  cursor.textContent='\u2588';
  cursor.style.cssText='animation:blink 1s steps(1) infinite;';
  if(!document.getElementById('bootblinkcss')){
    const st=document.createElement('style'); st.id='bootblinkcss';
    st.textContent='@keyframes blink{50%{opacity:0}}';
    document.head.appendChild(st);
  }
  term.appendChild(cursor);
  // synthesized terminal tick (WebAudio, no file) — fired per typed character
  let _termAC=null;
  function termTick(){
    try{
      if(!_termAC) _termAC=new (window.AudioContext||window.webkitAudioContext)();
      const ac=_termAC, t=ac.currentTime;
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='square';
      o.frequency.setValueAtTime(1400+Math.random()*700, t);
      g.gain.setValueAtTime(0.05, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.012);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+0.02);
    }catch(e){}
  }
  let li=0;
  function typeLine(){
    if(li>=BOOT_LINES.length){ setTimeout(startBootVideo, 900); return; }
    const line=BOOT_LINES[li++]; let ci=0;
    function typeChar(){
      if(ci<line.length){
        cursor.insertAdjacentText('beforebegin', line[ci++]);
        termTick();
        setTimeout(typeChar, 18+Math.random()*30);
      } else {
        cursor.insertAdjacentText('beforebegin','\n');
        setTimeout(typeLine, line.endsWith('[ OK ]')?120:420);
      }
    }
    typeChar();
  }
  setTimeout(typeLine, 2200);   // cursor blinks alone ~2s before typing starts

  function startBootVideo(){
    term.style.transition='opacity .8s ease';
    term.style.opacity='0';
    setTimeout(()=>term.remove(), 850);
    bgVid.play().catch(e=>console.warn('background.mp4 failed to play', e));
    bgVid.addEventListener('ended', ()=>{
      // plays once; stays frozen on the last frame
      const w=document.getElementById('installwin');
      if(w){ w.style.opacity='1'; w.style.pointerEvents='auto'; }
    }, {once:true});
  }

  const file=scr.querySelector('#fileItem');
  const me=scr.querySelector('#meItem');
  const meIco=me.querySelector('div');   // the icon wrapper inside "me"
  meIco.style.transition='transform .25s ease, filter .25s ease';
  me.style.transition='transform .25s ease';
  me.style.transformOrigin='center bottom';
  let drag=false, ox=0, oy=0;

  file.addEventListener('mousedown',e=>{
    drag=true; file.style.cursor='grabbing';
    file.style.position='relative'; file.style.zIndex='5';
    ox=e.clientX; oy=e.clientY; e.preventDefault();
  });
  addEventListener('mousemove',e=>{
    if(!drag) return;
    file.style.left=(e.clientX-ox)+'px';
    file.style.top=(e.clientY-oy)+'px';
    const r=me.getBoundingClientRect();
    const over = e.clientX>r.left-30 && e.clientX<r.right+30 &&
                 e.clientY>r.top-30 && e.clientY<r.bottom+30;
    me.style.transform    = over ? 'scale(1.3)' : 'scale(1)';
    meIco.style.filter    = over ? 'brightness(2.2)' : 'none';
  });
  addEventListener('mouseup',e=>{
    if(!drag) return;
    drag=false; file.style.cursor='grab';
    const r=me.getBoundingClientRect();
    const inside = e.clientX>r.left-30 && e.clientX<r.right+30 &&
                   e.clientY>r.top-30 && e.clientY<r.bottom+30;
    if(inside){
      // swallowed: file shrinks into "me", then reveal
      file.style.transition='transform .45s ease, opacity .45s ease';
      file.style.transformOrigin='center';
      const dx=r.left+r.width/2 - (e.clientX);
      const dy=r.top+r.height/2 - (e.clientY);
      file.style.transform='translate('+dx+'px,'+dy+'px) scale(.1)';
      file.style.opacity='0';
      playStartupChord();
      setTimeout(revealDesktop, 650);
    } else {
      // snap back
      file.style.transition='left .25s ease, top .25s ease';
      file.style.left='0'; file.style.top='0';
      setTimeout(()=>{ file.style.transition=''; },260);
    }
  });
}

// ---- feel.exe startup chord (WebAudio, no file) ----
// mimics an OS boot chime, but slightly detuned, muffled, and it sinks at the end
function playStartupChord(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const t0=ac.currentTime;
    const master=ac.createGain();
    master.gain.setValueAtTime(0.0001, t0);
    master.gain.exponentialRampToValueAtTime(0.5, t0+0.25);   // swell in
    master.gain.setValueAtTime(0.5, t0+1.1);
    master.gain.exponentialRampToValueAtTime(0.0001, t0+2.0); // fade out
    // muffled: lowpass = heard through a wall
    const lp=ac.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.setValueAtTime(1200, t0);
    lp.frequency.exponentialRampToValueAtTime(500, t0+1.9);   // world closes in
    master.connect(lp); lp.connect(ac.destination);
    // chord: C4 / Eb4 / G4 / C5 — minor, soft sines, each slightly off
    const freqs=[261.63, 311.13, 392.00, 523.25];
    freqs.forEach((f,i)=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine';
      const det=1+(Math.random()*0.008-0.004);               // gentle detune, never in tune
      o.frequency.setValueAtTime(f*det, t0);
      o.frequency.linearRampToValueAtTime(f*det*0.965, t0+2.0); // the sink at the tail
      g.gain.setValueAtTime(0.22-i*0.03, t0);
      o.connect(g); g.connect(master);
      o.start(t0+i*0.09);                                     // notes enter one by one
      o.stop(t0+2.1);
    });
  }catch(e){}
}

// ---- system UI sounds (WebAudio, no files) — same voice as the terminal ticks ----
let _uiAC=null;
function _uiCtx(){ if(!_uiAC) _uiAC=new (window.AudioContext||window.webkitAudioContext)(); return _uiAC; }
// single click on a folder: a dry select-tick
function uiSelect(){
  try{
    const ac=_uiCtx(), t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='square'; o.frequency.setValueAtTime(900, t);
    g.gain.setValueAtTime(0.045, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.03);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+0.04);
  }catch(e){}
}
// double click opens: a dull two-note knock, downward — a door, not a fanfare
function uiOpen(){
  try{
    const ac=_uiCtx(), t=ac.currentTime;
    [[300,0],[210,0.07]].forEach(([f,dt])=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine'; o.frequency.setValueAtTime(f, t+dt);
      g.gain.setValueAtTime(0.16, t+dt);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dt+0.14);
      o.connect(g); g.connect(ac.destination);
      o.start(t+dt); o.stop(t+dt+0.16);
    });
  }catch(e){}
}
// double-click helper: fires open() on the second clean click within 450ms.
// a single clean click fires uiSelect. movement beyond tol cancels (it was a drag).
function dblOpen(el, open, tol){
  tol=tol||6;
  let dx=0,dy=0,last=0;
  el.addEventListener('mousedown',(e)=>{ dx=e.clientX; dy=e.clientY; });
  el.addEventListener('mouseup',(e)=>{
    if(Math.abs(e.clientX-dx)+Math.abs(e.clientY-dy) > tol) return;
    const now=performance.now();
    if(now-last<450){ last=0; uiOpen(); open(); }
    else { last=now; }   // first click: silent
  });
}

// dot click (x / minus / plus on any window or folder bar): a low dry tap.
// global capture — fires before the dot's own handler, never blocks it.
function uiDot(){
  try{
    const ac=_uiCtx(), t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='square'; o.frequency.setValueAtTime(480, t);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.045);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+0.06);
  }catch(e){}
}
// the X has its OWN threat, different from yes/no: a minor-second clash
// (two tones a half step apart — the most dissonant interval there is)
// that slides DOWN and apart, like a door groaning shut. sharper, colder.
function uiMenaceX(){
  try{
    const ac=_uiCtx(), t=ac.currentTime;
    [[220,0.72],[233,0.60]].forEach(([f,drop])=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(f, t);
      o.frequency.exponentialRampToValueAtTime(f*drop, t+0.45);
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(0.2, t+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.45);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+0.5);
    });
  }catch(e){}
}
document.addEventListener('click',(e)=>{
  const dot=e.target.closest('.dot');
  if(dot){
    const sibs=[...(dot.closest('.dots')?.querySelectorAll('.dot')||[])];
    const idx=sibs.indexOf(dot);
    if(idx===0) uiMenaceX();   // the X: its own colder threat
    else uiDot();              // minus and plus: a dry tap
    return;
  }
  const yn=e.target.closest('.ynbtn');
  if(yn){
    // ONLY the minus-trap's yes carries the X threat ('Are you sure you want to
    // minimize?' — the dark row). every other answer button is a plain select tick.
    if(yn.dataset.v==='yes' && yn.closest('.ynrow-dark')) uiMenaceX();
    else uiSelect();
  }
}, true);

// EVERY subfolder, everywhere (journeys included), opens on double click.
// dblGate wraps a subfolder's own handler: the first click only ticks and arms,
// the second click within 450ms opens. nothing is swallowed or blocked — no
// stopPropagation, no preventDefault — so every other system keeps its clicks.
function dblGate(fn){
  let last=0;
  return function(ev){
    const now=performance.now();
    if(now-last<450){ last=0; uiOpen(); return fn.call(this, ev); }
    last=now;   // first click: silent — only the open has a voice
  };
}

// ONE law for every folder: opening ANY folder while a room is alive closes the
// room first — summary written, room shrunk to its keepsake, every sound killed.
// desktop folders still live BELOW the room until clicked (no topfolder for them).
function closeRoomForFolder(){
  if(typeof window._onPlantedFolderClick!=='function') return;
  flushSummary();
  const f=window._onPlantedFolderClick; window._onPlantedFolderClick=null;
  try{ f(); }catch(e){ console.warn('room close failed:', e); }
  // GUARANTEE: no big room window survives a folder click. whatever the room's
  // own wipe missed (or failed on), every non-relic room window is removed here.
  document.querySelectorAll('.win').forEach(w=>{
    if(w._brokenPart && !w._relicShrunk && !w._giveRelic && !w._keepRelic && !w._settledRoom){
      w.querySelectorAll('video').forEach(v=>{ try{ v.pause(); }catch(_){} });
      w.remove();
    }
  });
  _allAudio.forEach(a=>{ try{ a.pause(); a.play=()=>Promise.resolve(); }catch(_){} });
  document.querySelectorAll('.folder.topfolder').forEach(x=>x.classList.remove('topfolder'));
  document.querySelectorAll('.folder.beacon').forEach(x=>x.classList.remove('beacon'));
}
// ---- quiet background prefetch: the system readies the rooms behind your back ----
// on a hosted link (github pages) the room videos live on the network — the first
// visit to a room used to stall while they downloaded. this walks every room,
// one file at a time, at a gentle pace, so the browser cache is warm before the
// user ever reaches a room. locally it costs nothing (files load instantly).
function prefetchRooms(){
  if(window._prefetchStarted) return; window._prefetchStarted=true;
  // the FIRST room is decided right now — so it downloads first, audio and all,
  // and is warm in the cache long before the user's first journey ends.
  if(!window._nextRoomPick) window._nextRoomPick=chooseNextRoom();
  const dirs=ROOM_DIRS.slice();
  const first=dirs.indexOf(window._nextRoomPick);
  if(first>0){ dirs.splice(first,1); dirs.unshift(window._nextRoomPick); }
  const files=[];
  dirs.forEach(d=>{
    files.push(d+'/background.mp4', d+'/background.jpeg', d+'/sound.mp3');
    for(let i=1;i<=8;i++) files.push(d+'/radio'+i+'.m4a');
    files.push(d+'/radiostatic.m4a', d+'/fx1.m4a', d+'/fx2.m4a');
    for(let i=1;i<=40;i++) files.push(d+'/'+i+'.mp4');
  });
  let k=0, misses={};
  // an OPENING room jumps the line: its remaining files move to the front of the
  // queue, sounds first — so its audio and videos download before anything else.
  window._prefetchBoost=(dir)=>{
    const rest=files.slice(k);
    const mine=rest.filter(f=>f.indexOf(dir+'/')===0);
    if(!mine.length) return;
    const other=rest.filter(f=>f.indexOf(dir+'/')!==0);
    files.length=k; files.push(...mine, ...other);
  };
  const next=()=>{
    if(k>=files.length) return;
    const f=files[k++];
    const dir=f.slice(0, f.lastIndexOf('/'));
    if(misses[dir]>=3){ next(); return; }   // three missing numbers in a room -> that room is done
    fetch(f, {cache:'force-cache'})
      .then(r=>{ if(!r.ok){ if(/\d+\.mp4$/.test(f)) misses[dir]=(misses[dir]||0)+1; return; }
                 misses[dir]=0; return r.blob(); })
      .catch(()=>{})
      .then(()=>setTimeout(next, 60));   // barely a breath — the network is the only limit
  };
  next(); next(); next();   // three lanes in parallel
}
function revealDesktop(){
  setTimeout(()=>{
    document.getElementById('installscreen')?.remove();
    sysLog('mounted /me', 'ok');
    sysLog('desktop.load', 'all I kept');
    _syslogEl.classList.add('on');
    layoutFirstFolder();
    // reveal folders one by one, in random order
    const order=_deskEls.slice();
    for(let i=order.length-1;i>0;i--){
      const j=Math.random()*(i+1)|0; [order[i],order[j]]=[order[j],order[i]];
    }
    order.forEach((el,k)=>{
      setTimeout(()=>{
        el.style.transition='opacity .5s ease';
        el.style.opacity='1';
      }, k*25);
    });
  }, 280);
}
